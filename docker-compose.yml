# docker-compose.yml - Development environment
# Works with both Docker Compose and Podman Compose (rootless)
#
# Services:
#   db           - PostgreSQL 16 database
#   api          - FastAPI backend (hot-reload enabled)
#   frontend     - Next.js frontend (hot-reload enabled) - port 3000
#   worker       - Taskiq background task worker (scalable)
#   scheduler    - Taskiq scheduled task runner (single instance only)
#
# Usage:
#   podman-compose up --build           # Start all services
#   podman-compose down                 # Stop (keeps volumes)
#   podman-compose down -v              # Stop and remove volumes (fresh DB)
#   podman-compose up --scale worker=3  # Scale workers horizontally

services:
  db:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: nexorious
      POSTGRES_PASSWORD: nexorious
      POSTGRES_DB: nexorious
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexorious"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://nexorious:nexorious@db:5432/nexorious
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:Z
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Client-side (browser) API URL - goes directly to backend
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_STATIC_URL: http://localhost:8000
      # Server-side (middleware) API URL - container-to-container
      INTERNAL_API_URL: http://api:8000/api
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  # Scheduler must start before workers to create taskiq tables
  # Uses a wrapper script that creates tables then starts the scheduler
  scheduler:
    build: ./backend
    command: >
      sh -c "uv run python -c 'import asyncio; from app.worker.broker import broker; asyncio.run(broker.startup())' &&
             touch /tmp/taskiq_ready &&
             uv run taskiq scheduler app.worker.schedules:scheduler app.worker.tasks"
    environment:
      DATABASE_URL: postgresql://nexorious:nexorious@db:5432/nexorious
      # Scheduler creates tables (no TASKIQ_SKIP_TABLE_CREATION)
    volumes:
      - ./backend:/app:Z
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/taskiq_ready"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      replicas: 1  # Must remain 1 - taskiq has no leader election

  worker:
    build: ./backend
    command: uv run taskiq worker app.worker.broker:broker app.worker.tasks
    environment:
      DATABASE_URL: postgresql://nexorious:nexorious@db:5432/nexorious
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET}
      # Workers skip table creation - scheduler creates them
      TASKIQ_SKIP_TABLE_CREATION: "true"
      # Lower IGDB rate limits for workers to prevent violations from concurrent tasks
      # API uses full 4 req/s; workers use 1 req/s each to share the limit safely
      IGDB_REQUESTS_PER_SECOND: "1.0"
      IGDB_BURST_CAPACITY: "2"
    volumes:
      - ./backend:/app:Z
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      scheduler:
        condition: service_healthy

volumes:
  postgres_data:
