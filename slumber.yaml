name: Nexorious

profiles:
  local:
    name: Local
    data:
      base_url: http://localhost:8000
      username: admin
      password: abcd1234

requests:
  bootstrap:
    name: Bootstrap
    requests:
      run_migrations:
        name: Run Migrations
        method: POST
        url: "{{base_url}}/api/migrate/run"

      migration_status:
        name: Migration Status
        method: GET
        url: "{{base_url}}/api/migrate/status"

      create_admin:
        name: Create Admin
        method: POST
        url: "{{base_url}}/api/auth/setup/admin"
        body:
          type: json
          data:
            username: "{{username}}"
            password: "{{password}}"

  auth:
    name: Auth
    requests:
      login:
        name: Login
        method: POST
        url: "{{base_url}}/api/auth/login"
        body:
          type: json
          data:
            username: "{{username}}"
            password: "{{password}}"

      refresh:
        name: Refresh Token
        method: POST
        url: "{{base_url}}/api/auth/refresh"
        body:
          type: json
          data:
            refresh_token: "{{response('login', trigger='no_history') | jsonpath('$.refresh_token')}}"

      logout:
        name: Logout
        method: POST
        url: "{{base_url}}/api/auth/logout"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            refresh_token: "{{response('login', trigger='no_history') | jsonpath('$.refresh_token')}}"

      me:
        name: Me
        method: GET
        url: "{{base_url}}/api/auth/me"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

  health:
    name: Health
    requests:
      health_check:
        name: Health Check
        method: GET
        url: "{{base_url}}/health"

  migrate:
    name: Migrate
    requests:
      status:
        name: Status
        method: GET
        url: "{{base_url}}/api/migrate/status"

      run:
        name: Run
        method: POST
        url: "{{base_url}}/api/migrate/run"

      progress:
        name: Progress
        method: GET
        url: "{{base_url}}/api/migrate/progress"

  setup:
    name: Setup
    requests:
      setup_create_admin:
        name: Create Admin
        method: POST
        url: "{{base_url}}/api/auth/setup/admin"
        body:
          type: json
          data:
            username: "{{username}}"
            password: "{{password}}"
