name: Nexorious

# ── Reusable anchors (ignored by Slumber) ────────────────────────────

.authenticated:
  authentication:
    type: bearer
    token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

profiles:
  local:
    name: Local
    data:
      base_url: http://localhost:8000
      username: admin
      password: abcd1234

requests:
  bootstrap:
    name: Bootstrap
    requests:
      run_migrations:
        name: Run Migrations
        method: POST
        url: "{{base_url}}/api/migrate/run"

      migration_status:
        name: Migration Status
        method: GET
        url: "{{base_url}}/api/migrate/status"

      create_admin:
        name: Create Admin
        method: POST
        url: "{{base_url}}/api/auth/setup/admin"
        body:
          type: json
          data:
            username: "{{username}}"
            password: "{{password}}"

      list_setup_backups:
        name: List Setup Backups
        method: GET
        url: "{{base_url}}/api/auth/setup/backups"

      setup_restore_disk:
        name: Setup Restore from Disk
        method: POST
        url: "{{base_url}}/api/auth/setup/restore/disk"
        body:
          type: json
          data:
            filename: "{{response('list_setup_backups', trigger='no_history') | jsonpath('$.backups[*].filename', mode='array') | select()}}"

  admin:
    name: Admin
    requests:
      get_backup_config:
        name: Get Backup Config
        method: GET
        url: "{{base_url}}/api/admin/backups/config"
        $ref: "#/.authenticated"

      update_backup_config:
        name: Update Backup Config
        method: PUT
        url: "{{base_url}}/api/admin/backups/config"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            schedule_cron: "0 2 * * *"
            retention_mode: "{{select(['days', 'count'])}}"
            retention_value: 7

      list_backups:
        name: List Backups
        method: GET
        url: "{{base_url}}/api/admin/backups"
        $ref: "#/.authenticated"

      create_backup:
        name: Create Backup
        method: POST
        url: "{{base_url}}/api/admin/backups"
        $ref: "#/.authenticated"

      delete_backup:
        name: Delete Backup
        method: DELETE
        url: "{{base_url}}/api/admin/backups/{{response('list_backups', trigger='no_history') | jsonpath('$.backups[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"

      download_backup:
        name: Download Backup
        method: GET
        url: "{{base_url}}/api/admin/backups/{{response('list_backups', trigger='no_history') | jsonpath('$.backups[*].id', mode='array') | select()}}/download"
        $ref: "#/.authenticated"

      restore_backup:
        name: Restore Backup
        method: POST
        url: "{{base_url}}/api/admin/backups/{{response('list_backups', trigger='no_history') | jsonpath('$.backups[*].id', mode='array') | select()}}/restore"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            confirm: true

      restore_upload:
        name: Restore from Upload
        method: POST
        url: "{{base_url}}/api/admin/backups/restore/upload"
        $ref: "#/.authenticated"
        body:
          type: form_multipart
          data:
            file: "{{file(prompt(message='Path to backup .tar.gz file'))}}"

  admin_users:
    name: Admin Users
    requests:
      create_user:
        name: Create User
        method: POST
        url: "{{base_url}}/api/auth/admin/users"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            username: "newuser"
            password: "abcd1234"
            is_admin: false

      list_users:
        name: List Users
        method: GET
        url: "{{base_url}}/api/auth/admin/users"
        $ref: "#/.authenticated"

      get_user:
        name: Get User
        method: GET
        url: "{{base_url}}/api/auth/admin/users/{{response('list_users', trigger='no_history') | jsonpath('$[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"

      update_user:
        name: Update User
        method: PUT
        url: "{{base_url}}/api/auth/admin/users/{{response('list_users', trigger='no_history') | jsonpath('$[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            username: "updateduser"
            is_active: true
            is_admin: false

      reset_password:
        name: Reset Password
        method: PUT
        url: "{{base_url}}/api/auth/admin/users/{{response('list_users', trigger='no_history') | jsonpath('$[*].id', mode='array') | select()}}/password"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            new_password: "newpass1234"

      deletion_impact:
        name: Deletion Impact
        method: GET
        url: "{{base_url}}/api/auth/admin/users/{{response('list_users', trigger='no_history') | jsonpath('$[*].id', mode='array') | select()}}/deletion-impact"
        $ref: "#/.authenticated"

      delete_user:
        name: Delete User
        method: DELETE
        url: "{{base_url}}/api/auth/admin/users/{{response('list_users', trigger='no_history') | jsonpath('$[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"

  auth:
    name: Auth
    requests:
      login:
        name: Login
        method: POST
        url: "{{base_url}}/api/auth/login"
        body:
          type: json
          data:
            username: "{{username}}"
            password: "{{password}}"

      refresh:
        name: Refresh Token
        method: POST
        url: "{{base_url}}/api/auth/refresh"
        body:
          type: json
          data:
            refresh_token: "{{response('login', trigger='no_history') | jsonpath('$.refresh_token')}}"

      logout:
        name: Logout
        method: POST
        url: "{{base_url}}/api/auth/logout"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            refresh_token: "{{response('login', trigger='no_history') | jsonpath('$.refresh_token')}}"

      me:
        name: Me
        method: GET
        url: "{{base_url}}/api/auth/me"
        $ref: "#/.authenticated"

      update_me:
        name: Update Preferences
        method: PUT
        url: "{{base_url}}/api/auth/me"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            preferences:
              theme: dark
              language: en

      change_password:
        name: Change Password
        method: PUT
        url: "{{base_url}}/api/auth/change-password"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            current_password: "{{password}}"
            new_password: "{{prompt(message='New password', sensitive=true)}}"

      check_username:
        name: Check Username
        method: GET
        url: "{{base_url}}/api/auth/username/check/{{prompt(message='Username to check')}}"
        $ref: "#/.authenticated"

      change_username:
        name: Change Username
        method: PUT
        url: "{{base_url}}/api/auth/username"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            new_username: "{{prompt(message='New username')}}"

  health:
    name: Health
    requests:
      health_check:
        name: Health Check
        method: GET
        url: "{{base_url}}/health"

  import:
    name: Import
    requests:
      nexorious:
        name: Import Nexorious
        method: POST
        url: "{{base_url}}/api/import/nexorious"
        $ref: "#/.authenticated"
        body:
          type: form_multipart
          data:
            file: "{{file(prompt(message='Path to nexorious export JSON file'))}}"

  job_items:
    name: Job Items
    requests:
      get_job_item:
        name: Get Job Item
        method: GET
        url: "{{base_url}}/api/job-items/{{prompt(message='Job Item ID')}}"
        $ref: "#/.authenticated"

      resolve_item:
        name: Resolve Item
        method: POST
        url: "{{base_url}}/api/job-items/{{prompt(message='Job Item ID')}}/resolve"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            igdb_id: "{{prompt(message='IGDB ID to resolve to') | json_parse()}}"

      skip_item:
        name: Skip Item
        method: POST
        url: "{{base_url}}/api/job-items/{{prompt(message='Job Item ID')}}/skip"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            reason: "{{prompt(message='Skip reason')}}"

      retry_item:
        name: Retry Item
        method: POST
        url: "{{base_url}}/api/job-items/{{prompt(message='Job Item ID')}}/retry"
        $ref: "#/.authenticated"

  # Note: metadata_refresh jobs are scheduler-only (no HTTP trigger).
  jobs:
    name: Jobs
    requests:
      list_jobs:
        name: List Jobs
        method: GET
        url: "{{base_url}}/api/jobs?per_page=10"
        $ref: "#/.authenticated"

      jobs_summary:
        name: Jobs Summary
        method: GET
        url: "{{base_url}}/api/jobs/summary"
        $ref: "#/.authenticated"

      pending_review_count:
        name: Pending Review Count
        method: GET
        url: "{{base_url}}/api/jobs/pending-review-count"
        $ref: "#/.authenticated"

      active_job:
        name: Active Job
        method: GET
        url: "{{base_url}}/api/jobs/active/sync"
        $ref: "#/.authenticated"

      recent_jobs:
        name: Recent Jobs
        method: GET
        url: "{{base_url}}/api/jobs/recent/steam?limit=5"
        $ref: "#/.authenticated"

      get_job:
        name: Get Job
        method: GET
        url: "{{base_url}}/api/jobs/{{response('list_jobs', trigger='no_history') | jsonpath('$.items[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"

      get_job_items:
        name: Get Job Items
        method: GET
        url: "{{base_url}}/api/jobs/{{response('list_jobs', trigger='no_history') | jsonpath('$.items[*].id', mode='array') | select()}}/items?per_page=10"
        $ref: "#/.authenticated"

      cancel_job:
        name: Cancel Job
        method: POST
        url: "{{base_url}}/api/jobs/{{response('list_jobs', trigger='no_history') | jsonpath('$.items[*].id', mode='array') | select()}}/cancel"
        $ref: "#/.authenticated"

      delete_job:
        name: Delete Job
        method: DELETE
        url: "{{base_url}}/api/jobs/{{response('list_jobs', trigger='no_history') | jsonpath('$.items[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"

      retry_failed:
        name: Retry Failed Items
        method: POST
        url: "{{base_url}}/api/jobs/{{response('list_jobs', trigger='no_history') | jsonpath('$.items[*].id', mode='array') | select()}}/retry-failed"
        $ref: "#/.authenticated"

  migrate:
    name: Migrate
    requests:
      status:
        name: Status
        method: GET
        url: "{{base_url}}/api/migrate/status"

      run:
        name: Run
        method: POST
        url: "{{base_url}}/api/migrate/run"

      progress:
        name: Progress
        method: GET
        url: "{{base_url}}/api/migrate/progress"

  platforms:
    name: Platforms
    requests:
      list_platforms:
        name: List Platforms
        method: GET
        url: "{{base_url}}/api/platforms"
        $ref: "#/.authenticated"

      platforms_simple_list:
        name: Platforms Simple List
        method: GET
        url: "{{base_url}}/api/platforms/simple-list"
        $ref: "#/.authenticated"

      get_platform:
        name: Get Platform
        method: GET
        url: "{{base_url}}/api/platforms/{{response('platforms_simple_list', trigger='1d') | jsonpath('$[*].name', mode='array') | select()}}"
        $ref: "#/.authenticated"

      platform_storefronts:
        name: Platform Storefronts
        method: GET
        url: "{{base_url}}/api/platforms/{{response('platforms_simple_list', trigger='1d') | jsonpath('$[*].name', mode='array') | select()}}/storefronts"
        $ref: "#/.authenticated"

      platform_default_storefront:
        name: Platform Default Storefront
        method: GET
        url: "{{base_url}}/api/platforms/{{response('platforms_simple_list', trigger='1d') | jsonpath('$[*].name', mode='array') | select()}}/default-storefront"
        $ref: "#/.authenticated"

      list_storefronts:
        name: List Storefronts
        method: GET
        url: "{{base_url}}/api/platforms/storefronts"
        $ref: "#/.authenticated"

      storefronts_simple_list:
        name: Storefronts Simple List
        method: GET
        url: "{{base_url}}/api/platforms/storefronts/simple-list"
        $ref: "#/.authenticated"

      get_storefront:
        name: Get Storefront
        method: GET
        url: "{{base_url}}/api/platforms/storefronts/{{response('storefronts_simple_list', trigger='1d') | jsonpath('$[*].name', mode='array') | select()}}"
        $ref: "#/.authenticated"

  export:
    name: Export
    requests:
      export_json:
        name: Export JSON
        method: POST
        url: "{{base_url}}/api/export/json"
        $ref: "#/.authenticated"

      export_csv:
        name: Export CSV
        method: POST
        url: "{{base_url}}/api/export/csv"
        $ref: "#/.authenticated"

      download:
        name: Download Export
        method: GET
        url: "{{base_url}}/api/export/{{prompt(message='Export Job ID')}}/download"
        $ref: "#/.authenticated"

  games:
    name: Games
    requests:
      list_games:
        name: List Games
        method: GET
        url: "{{base_url}}/api/games?page=1&per_page=20"
        $ref: "#/.authenticated"

      get_game:
        name: Get Game
        method: GET
        url: "{{base_url}}/api/games/{{prompt(message='Game ID')}}"
        $ref: "#/.authenticated"

      search_igdb:
        name: Search IGDB
        method: POST
        url: "{{base_url}}/api/games/search/igdb"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            query: "{{prompt(message='IGDB search query')}}"
            limit: 10

      get_igdb_game:
        name: Get IGDB Game
        method: GET
        url: "{{base_url}}/api/games/igdb/{{prompt(message='IGDB Game ID')}}"
        $ref: "#/.authenticated"

      import_igdb:
        name: Import from IGDB
        method: POST
        url: "{{base_url}}/api/games/igdb-import"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            igdb_id: "{{prompt(message='IGDB ID to import') | json_parse()}}"
            download_cover_art: true

  sync:
    name: Sync
    requests:
      list_config:
        name: List Config
        method: GET
        url: "{{base_url}}/api/sync/config"
        $ref: "#/.authenticated"

      get_steam_config:
        name: Get Steam Config
        method: GET
        url: "{{base_url}}/api/sync/config/steam"
        $ref: "#/.authenticated"

      update_steam_config:
        name: Update Steam Config
        method: PUT
        url: "{{base_url}}/api/sync/config/steam"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            frequency: "daily"
            auto_add: false

      steam_verify:
        name: Steam Verify
        method: POST
        url: "{{base_url}}/api/sync/steam/verify"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            steam_id: "{{prompt(message='Steam ID')}}"
            web_api_key: "{{prompt(message='Web API Key', sensitive=true)}}"

      steam_disconnect:
        name: Steam Disconnect
        method: DELETE
        url: "{{base_url}}/api/sync/steam/connection"
        $ref: "#/.authenticated"

      external_game_rematch:
        name: Rematch External Game
        method: POST
        url: "{{base_url}}/api/sync/external-games/{{external_game_id}}/rematch"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            igdb_id: 1234
            orphan_action: "keep"

      external_game_skip:
        name: Skip External Game
        method: POST
        url: "{{base_url}}/api/sync/ignored/{{external_game_id}}"
        $ref: "#/.authenticated"

      external_game_unskip:
        name: Unskip External Game
        method: DELETE
        url: "{{base_url}}/api/sync/ignored/{{external_game_id}}"
        $ref: "#/.authenticated"

      external_games_list:
        name: List External Games
        method: GET
        url: "{{base_url}}/api/sync/steam/external-games"
        $ref: "#/.authenticated"

      psn_configure:
        name: PSN Configure
        method: POST
        url: "{{base_url}}/api/sync/psn/configure"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            npsso_token: "{{prompt(message='NPSSO Token', sensitive=true)}}"

      psn_status:
        name: PSN Status
        method: GET
        url: "{{base_url}}/api/sync/psn/connection"
        $ref: "#/.authenticated"

      psn_disconnect:
        name: PSN Disconnect
        method: DELETE
        url: "{{base_url}}/api/sync/psn/connection"
        $ref: "#/.authenticated"

      epic_connect:
        name: Epic Connect
        method: POST
        url: "{{base_url}}/api/sync/epic/connect"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            auth_code: "{{prompt(message='Epic Auth Code', sensitive=true)}}"

      epic_connection:
        name: Epic Connection Status
        method: GET
        url: "{{base_url}}/api/sync/epic/connection"
        $ref: "#/.authenticated"

      epic_disconnect:
        name: Epic Disconnect
        method: DELETE
        url: "{{base_url}}/api/sync/epic/connection"
        $ref: "#/.authenticated"

      trigger_epic:
        name: Trigger Epic Sync
        method: POST
        url: "{{base_url}}/api/sync/epic"
        $ref: "#/.authenticated"

      epic_sync_status:
        name: Epic Sync Status
        method: GET
        url: "{{base_url}}/api/sync/epic/status"
        $ref: "#/.authenticated"

      gog_connect:
        name: GOG Connect
        method: POST
        url: "{{base_url}}/api/sync/gog/connect"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            auth_code: "{{prompt(message='GOG Auth Code', sensitive=true)}}"

      gog_connection:
        name: GOG Connection Status
        method: GET
        url: "{{base_url}}/api/sync/gog/connection"
        $ref: "#/.authenticated"

      gog_disconnect:
        name: GOG Disconnect
        method: DELETE
        url: "{{base_url}}/api/sync/gog/connection"
        $ref: "#/.authenticated"

      gog_external_games:
        name: GOG External Games
        method: GET
        url: "{{base_url}}/api/sync/gog/external-games"
        $ref: "#/.authenticated"

      gog_reset:
        name: GOG Reset Sync Data
        method: DELETE
        url: "{{base_url}}/api/sync/gog/data"
        $ref: "#/.authenticated"

      gog_sync_status:
        name: GOG Sync Status
        method: GET
        url: "{{base_url}}/api/sync/gog/status"
        $ref: "#/.authenticated"

      trigger_gog:
        name: Trigger GOG Sync
        method: POST
        url: "{{base_url}}/api/sync/gog"
        $ref: "#/.authenticated"

      trigger_steam:
        name: Trigger Steam Sync
        method: POST
        url: "{{base_url}}/api/sync/steam"
        $ref: "#/.authenticated"

      steam_sync_status:
        name: Steam Sync Status
        method: GET
        url: "{{base_url}}/api/sync/steam/status"
        $ref: "#/.authenticated"

      list_ignored:
        name: List Ignored
        method: GET
        url: "{{base_url}}/api/sync/ignored"
        $ref: "#/.authenticated"

  tags:
    name: Tags
    requests:
      list_tags:
        name: List Tags
        method: GET
        url: "{{base_url}}/api/tags"
        $ref: "#/.authenticated"

      create_tag:
        name: Create Tag
        method: POST
        url: "{{base_url}}/api/tags"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            name: "{{prompt(message='Tag name')}}"
            color: "{{prompt(message='Tag color (hex)')}}"

      update_tag:
        name: Update Tag
        method: PUT
        url: "{{base_url}}/api/tags/{{response('list_tags', trigger='no_history') | jsonpath('$[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            name: "{{prompt(message='New tag name')}}"
            color: "{{prompt(message='New tag color (hex)')}}"

      delete_tag:
        name: Delete Tag
        method: DELETE
        url: "{{base_url}}/api/tags/{{response('list_tags', trigger='no_history') | jsonpath('$[*].id', mode='array') | select()}}"
        $ref: "#/.authenticated"

  user_games:
    name: User Games
    requests:
      list:
        name: List User Games
        method: GET
        url: "{{base_url}}/api/user-games"
        $ref: "#/.authenticated"
        query:
          page: "1"
          per_page: "20"

      ids:
        name: List User Game IDs
        method: GET
        url: "{{base_url}}/api/user-games/ids"
        $ref: "#/.authenticated"

      genres:
        name: List Genres
        method: GET
        url: "{{base_url}}/api/user-games/genres"
        $ref: "#/.authenticated"

      filter_options:
        name: Filter Options
        method: GET
        url: "{{base_url}}/api/user-games/filter-options"
        $ref: "#/.authenticated"

      stats:
        name: Collection Stats
        method: GET
        url: "{{base_url}}/api/user-games/stats"
        $ref: "#/.authenticated"

      get:
        name: Get User Game
        method: GET
        url: "{{base_url}}/api/user-games/{{response('ids', trigger='no_history') | jsonpath('$.ids[*]', mode='array') | select()}}"
        $ref: "#/.authenticated"

      create:
        name: Create User Game
        method: POST
        url: "{{base_url}}/api/user-games"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            game_id: "{{prompt(message='Game ID') | json_parse()}}"
            play_status: "{{select(['not_started', 'in_progress', 'completed', 'on_hold', 'dropped'])}}"

      update:
        name: Update User Game
        method: PUT
        url: "{{base_url}}/api/user-games/{{response('ids', trigger='no_history') | jsonpath('$.ids[*]', mode='array') | select()}}"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            play_status: "{{select(['not_started', 'in_progress', 'completed', 'on_hold', 'dropped'])}}"
            is_loved: false

      update_progress:
        name: Update Progress
        method: PUT
        url: "{{base_url}}/api/user-games/{{response('ids', trigger='no_history') | jsonpath('$.ids[*]', mode='array') | select()}}/progress"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            hours_played: "{{prompt(message='Hours played') | json_parse()}}"
            play_status: "{{select(['not_started', 'in_progress', 'completed', 'on_hold', 'dropped'])}}"

      delete:
        name: Delete User Game
        method: DELETE
        url: "{{base_url}}/api/user-games/{{response('ids', trigger='no_history') | jsonpath('$.ids[*]', mode='array') | select()}}"
        $ref: "#/.authenticated"

      bulk_update:
        name: Bulk Update
        method: PUT
        url: "{{base_url}}/api/user-games/bulk-update"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            ids:
              - "{{prompt(message='First User Game ID')}}"
              - "{{prompt(message='Second User Game ID')}}"
            updates:
              play_status: "{{select(['not_started', 'in_progress', 'completed', 'on_hold', 'dropped'])}}"

      bulk_delete:
        name: Bulk Delete
        method: DELETE
        url: "{{base_url}}/api/user-games/bulk-delete"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            ids:
              - "{{prompt(message='User Game ID to delete')}}"

      ug_list_platforms:
        name: List Platforms
        method: GET
        url: "{{base_url}}/api/user-games/{{response('ids', trigger='no_history') | jsonpath('$.ids[*]', mode='array') | select()}}/platforms"
        $ref: "#/.authenticated"

      ug_create_platform:
        name: Create Platform
        method: POST
        url: "{{base_url}}/api/user-games/{{response('ids', trigger='no_history') | jsonpath('$.ids[*]', mode='array') | select()}}/platforms"
        $ref: "#/.authenticated"
        body:
          type: json
          data:
            platform: "{{response('platforms_simple_list', trigger='1d') | jsonpath('$[*].name', mode='array') | select()}}"
            storefront: "{{response('storefronts_simple_list', trigger='1d') | jsonpath('$[*].name', mode='array') | select()}}"
            ownership_status: "{{select(['owned', 'subscription', 'trial', 'free_to_play'])}}"
