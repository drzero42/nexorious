name: Nexorious

profiles:
  local:
    name: Local
    data:
      base_url: http://localhost:8000
      username: admin
      password: abcd1234

requests:
  bootstrap:
    name: Bootstrap
    requests:
      run_migrations:
        name: Run Migrations
        method: POST
        url: "{{base_url}}/api/migrate/run"

      migration_status:
        name: Migration Status
        method: GET
        url: "{{base_url}}/api/migrate/status"

      create_admin:
        name: Create Admin
        method: POST
        url: "{{base_url}}/api/auth/setup/admin"
        body:
          type: json
          data:
            username: "{{username}}"
            password: "{{password}}"

  auth:
    name: Auth
    requests:
      login:
        name: Login
        method: POST
        url: "{{base_url}}/api/auth/login"
        body:
          type: json
          data:
            username: "{{username}}"
            password: "{{password}}"

      refresh:
        name: Refresh Token
        method: POST
        url: "{{base_url}}/api/auth/refresh"
        body:
          type: json
          data:
            refresh_token: "{{response('login', trigger='no_history') | jsonpath('$.refresh_token')}}"

      logout:
        name: Logout
        method: POST
        url: "{{base_url}}/api/auth/logout"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            refresh_token: "{{response('login', trigger='no_history') | jsonpath('$.refresh_token')}}"

      me:
        name: Me
        method: GET
        url: "{{base_url}}/api/auth/me"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      update_me:
        name: Update Preferences
        method: PUT
        url: "{{base_url}}/api/auth/me"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            preferences:
              theme: dark
              language: en

      change_password:
        name: Change Password
        method: PUT
        url: "{{base_url}}/api/auth/change-password"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            current_password: "{{password}}"
            new_password: newpass1234

      check_username:
        name: Check Username
        method: GET
        url: "{{base_url}}/api/auth/username/check/newname"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      change_username:
        name: Change Username
        method: PUT
        url: "{{base_url}}/api/auth/username"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            new_username: newadmin

  health:
    name: Health
    requests:
      health_check:
        name: Health Check
        method: GET
        url: "{{base_url}}/health"

  job_items:
    name: Job Items
    requests:
      get_job_item:
        name: Get Job Item
        method: GET
        url: "{{base_url}}/api/job-items/REPLACE_WITH_ITEM_ID"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      resolve_item:
        name: Resolve Item
        method: POST
        url: "{{base_url}}/api/job-items/REPLACE_WITH_ITEM_ID/resolve"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            igdb_id: 12345

      skip_item:
        name: Skip Item
        method: POST
        url: "{{base_url}}/api/job-items/REPLACE_WITH_ITEM_ID/skip"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            reason: "not interested"

      retry_item:
        name: Retry Item
        method: POST
        url: "{{base_url}}/api/job-items/REPLACE_WITH_ITEM_ID/retry"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

  jobs:
    name: Jobs
    requests:
      list_jobs:
        name: List Jobs
        method: GET
        url: "{{base_url}}/api/jobs?per_page=10"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      jobs_summary:
        name: Jobs Summary
        method: GET
        url: "{{base_url}}/api/jobs/summary"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      pending_review_count:
        name: Pending Review Count
        method: GET
        url: "{{base_url}}/api/jobs/pending-review-count"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      active_job:
        name: Active Job
        method: GET
        url: "{{base_url}}/api/jobs/active/sync"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      recent_jobs:
        name: Recent Jobs
        method: GET
        url: "{{base_url}}/api/jobs/recent/steam?limit=5"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      get_job:
        name: Get Job
        method: GET
        url: "{{base_url}}/api/jobs/REPLACE_WITH_JOB_ID"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      get_job_items:
        name: Get Job Items
        method: GET
        url: "{{base_url}}/api/jobs/REPLACE_WITH_JOB_ID/items?per_page=10"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      cancel_job:
        name: Cancel Job
        method: POST
        url: "{{base_url}}/api/jobs/REPLACE_WITH_JOB_ID/cancel"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      delete_job:
        name: Delete Job
        method: DELETE
        url: "{{base_url}}/api/jobs/REPLACE_WITH_JOB_ID"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      retry_failed:
        name: Retry Failed Items
        method: POST
        url: "{{base_url}}/api/jobs/REPLACE_WITH_JOB_ID/retry-failed"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

  migrate:
    name: Migrate
    requests:
      status:
        name: Status
        method: GET
        url: "{{base_url}}/api/migrate/status"

      run:
        name: Run
        method: POST
        url: "{{base_url}}/api/migrate/run"

      progress:
        name: Progress
        method: GET
        url: "{{base_url}}/api/migrate/progress"

  platforms:
    name: Platforms
    requests:
      list_platforms:
        name: List Platforms
        method: GET
        url: "{{base_url}}/api/platforms"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      platforms_simple_list:
        name: Platforms Simple List
        method: GET
        url: "{{base_url}}/api/platforms/simple-list"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      get_platform:
        name: Get Platform
        method: GET
        url: "{{base_url}}/api/platforms/pc-windows"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      platform_storefronts:
        name: Platform Storefronts
        method: GET
        url: "{{base_url}}/api/platforms/pc-windows/storefronts"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      platform_default_storefront:
        name: Platform Default Storefront
        method: GET
        url: "{{base_url}}/api/platforms/pc-windows/default-storefront"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      list_storefronts:
        name: List Storefronts
        method: GET
        url: "{{base_url}}/api/platforms/storefronts/"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      storefronts_simple_list:
        name: Storefronts Simple List
        method: GET
        url: "{{base_url}}/api/platforms/storefronts/simple-list"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      get_storefront:
        name: Get Storefront
        method: GET
        url: "{{base_url}}/api/platforms/storefronts/steam"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

  games:
    name: Games
    requests:
      list_games:
        name: List Games
        method: GET
        url: "{{base_url}}/api/games?page=1&per_page=20"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      get_game:
        name: Get Game
        method: GET
        url: "{{base_url}}/api/games/1942"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      search_igdb:
        name: Search IGDB
        method: POST
        url: "{{base_url}}/api/games/search/igdb"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            query: "The Witcher 3"
            limit: 10

      get_igdb_game:
        name: Get IGDB Game
        method: GET
        url: "{{base_url}}/api/games/igdb/1942"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      import_igdb:
        name: Import from IGDB
        method: POST
        url: "{{base_url}}/api/games/igdb-import"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            igdb_id: 1942
            download_cover_art: true

  tags:
    name: Tags
    requests:
      list_tags:
        name: List Tags
        method: GET
        url: "{{base_url}}/api/tags"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      create_tag:
        name: Create Tag
        method: POST
        url: "{{base_url}}/api/tags"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            name: Favorites
            color: "#ff0000"

      update_tag:
        name: Update Tag
        method: PUT
        url: "{{base_url}}/api/tags/TAG_ID_HERE"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            name: Updated Name
            color: "#00ff00"

      delete_tag:
        name: Delete Tag
        method: DELETE
        url: "{{base_url}}/api/tags/TAG_ID_HERE"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

  user_games:
    name: User Games
    requests:
      list:
        name: List User Games
        method: GET
        url: "{{base_url}}/api/user-games"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        query:
          page: "1"
          per_page: "20"

      ids:
        name: List User Game IDs
        method: GET
        url: "{{base_url}}/api/user-games/ids"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      genres:
        name: List Genres
        method: GET
        url: "{{base_url}}/api/user-games/genres"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      filter_options:
        name: Filter Options
        method: GET
        url: "{{base_url}}/api/user-games/filter-options"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      stats:
        name: Collection Stats
        method: GET
        url: "{{base_url}}/api/user-games/stats"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      get:
        name: Get User Game
        method: GET
        url: "{{base_url}}/api/user-games/REPLACE_WITH_ID"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      create:
        name: Create User Game
        method: POST
        url: "{{base_url}}/api/user-games"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            game_id: 1942
            play_status: not_started

      update:
        name: Update User Game
        method: PUT
        url: "{{base_url}}/api/user-games/REPLACE_WITH_ID"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            play_status: completed
            is_loved: true

      update_progress:
        name: Update Progress
        method: PUT
        url: "{{base_url}}/api/user-games/REPLACE_WITH_ID/progress"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            hours_played: 12.5
            play_status: in_progress

      delete:
        name: Delete User Game
        method: DELETE
        url: "{{base_url}}/api/user-games/REPLACE_WITH_ID"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      bulk_update:
        name: Bulk Update
        method: PUT
        url: "{{base_url}}/api/user-games/bulk-update"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            ids:
              - "REPLACE_WITH_ID_1"
              - "REPLACE_WITH_ID_2"
            updates:
              play_status: completed

      bulk_delete:
        name: Bulk Delete
        method: DELETE
        url: "{{base_url}}/api/user-games/bulk-delete"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            ids:
              - "REPLACE_WITH_ID_1"

      ug_list_platforms:
        name: List Platforms
        method: GET
        url: "{{base_url}}/api/user-games/REPLACE_WITH_ID/platforms"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"

      ug_create_platform:
        name: Create Platform
        method: POST
        url: "{{base_url}}/api/user-games/REPLACE_WITH_ID/platforms"
        authentication:
          type: bearer
          token: "{{response('login', trigger='no_history') | jsonpath('$.access_token')}}"
        body:
          type: json
          data:
            platform: pc-windows
            storefront: steam
            ownership_status: owned
