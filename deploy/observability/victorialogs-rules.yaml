# Nexorious — VictoriaLogs alerting rules for vmalert (LogsQL, type: vlogs).
#
# SINGLE SOURCE OF TRUTH. Two ways to use it:
#   1. Non-Helm: point a vmalert instance at VictoriaLogs and load this file:
#        vmalert -datasource.url=http://victorialogs:9428 \
#                -rule.defaultRuleType=vlogs \
#                -notifier.url=http://alertmanager:9093 \
#                -rule=/etc/vmalert/victorialogs-rules.yaml
#      (each group already sets type: vlogs, so -rule.defaultRuleType is optional.)
#   2. Helm: set alerts.enabled=true and alerts.victoriaLogs.enabled=true — the
#      chart wraps these groups into a VMRule (VictoriaMetrics Operator).
#
# INGESTION: every expr runs `| unpack_json` to parse nexorious's JSON log line
# into the level/category/source/msg fields it filters on. This works whether your
# shipper parsed the JSON into discrete fields OR shipped the raw line into `_msg`
# (e.g. Fluent Bit with `_msg_field=log` and no JSON parser): unpack_json reads
# `_msg` by default and is a no-op on a non-JSON `_msg`, so an already-parsed setup
# is unaffected. Without it the field filters match zero rows. `count(*)` (not bare
# `count()`) is the portable stats form across VictoriaLogs versions.
#
# SCOPING: VictoriaLogs has no per-app field inside nexorious's JSON. If multiple
# apps ship to the same VictoriaLogs, PREPEND an app-scoping filter to every expr —
# e.g. `app:="nexorious" _time:5m | unpack_json | ...` if your collector adds a
# top-level `app` field (it filters before unpack_json, so it must be a field the
# collector set, not one inside the app's JSON) — or these rules will count other
# apps' logs too. Thresholds/windows are conservative — tune.
#
# Each group sets interval: 1m (eval cadence); the window is the explicit _time:
# filter at the start of each expr (it replaces vmalert's auto-injected _time).
#
# Fields: level (INFO/WARN/ERROR/DEBUG), category (db/auth/external_api/
# validation/config/panic), source (storefront slug), msg.
groups:
  - name: nexorious-db-startup
    type: vlogs
    interval: 1m
    rules:
      - alert: NexoriousDBUnavailable
        expr: '_time:5m | unpack_json | filter msg:="database unavailable" | stats count(*) as logs | filter logs:>0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Nexorious lost its database connection"
          description: "{{ $value }} 'database unavailable' log line(s) in 5m — the app is in the DBUnavailable state and is not serving normally."

      - alert: NexoriousStartupFailure
        expr: '_time:5m | unpack_json | filter category:="db" level:="ERROR" (msg:"migrate:" OR msg:"river client init failed") | stats count(*) as logs | filter logs:>0'
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Nexorious migration or River startup failure"
          description: "{{ $value }} migration/startup failure line(s) in 5m — migrations failed or the River client failed to initialize; the app cannot reach Ready."

  - name: nexorious-panics
    type: vlogs
    interval: 1m
    rules:
      - alert: NexoriousPanicRecovered
        expr: '_time:5m | unpack_json | filter category:="panic" | stats count(*) as logs | filter logs:>0'
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Nexorious recovered a panic"
          description: "{{ $value }} recovered panic(s) in 5m (category=panic) — an HTTP request or worker job hit an unhandled error."

  - name: nexorious-credentials
    type: vlogs
    interval: 1m
    rules:
      - alert: NexoriousCredentialFailures
        expr: '_time:15m | unpack_json | filter category:="auth" | stats by (source) count(*) as logs | filter logs:>3'
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Repeated credential/auth failures for source '{{ index .Labels \"source\" }}'"
          description: "{{ $value }} auth-category failures for source '{{ index .Labels \"source\" }}' in 15m — stored credentials are likely expired or invalid."

  - name: nexorious-sync-jobs
    type: vlogs
    interval: 1m
    rules:
      - alert: NexoriousSyncErrors
        expr: '_time:15m | unpack_json | filter category:="external_api" | stats by (source) count(*) as logs | filter logs:>3'
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Elevated sync / external-API errors for source '{{ index .Labels \"source\" }}'"
          description: "{{ $value }} external_api failures for source '{{ index .Labels \"source\" }}' in 15m."

      - alert: NexoriousStuckJobs
        expr: '_time:15m | unpack_json | filter msg:"marked stale" | stats count(*) as logs | filter logs:>0'
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Nexorious reaped stuck jobs"
          description: "{{ $value }} stale-job reaping event(s) in 15m — jobs were stuck and force-marked failed."

      - alert: NexoriousJobDispatchFailures
        expr: '_time:10m | unpack_json | filter category:="db" level:="ERROR" msg:"enqueue" | stats count(*) as logs | filter logs:>0'
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Nexorious job enqueue/dispatch failures"
          description: "{{ $value }} job enqueue/dispatch failure(s) in 10m — River jobs may not have been scheduled."

  - name: nexorious-generic
    type: vlogs
    interval: 1m
    rules:
      - alert: NexoriousHighErrorRate
        expr: '_time:10m | unpack_json | filter level:="ERROR" | stats count(*) as logs | filter logs:>10'
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Elevated nexorious error-log rate"
          description: "{{ $value }} ERROR-level log lines in 10m across all categories — investigate for a broader fault."
