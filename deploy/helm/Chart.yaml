apiVersion: v2
name: nexorious
description: Self-hosted game collection
type: application
version: 0.10.0 # x-release-please-version
# appVersion is the default image tag for the nexorious container, kept in
# sync with the chart's release version by release-please. To run a different
# release than the chart was built for, override
# controllers.nexorious.containers.main.image.tag and the matching
# initContainers.migrate.image.tag in values.
appVersion: "0.10.0" # x-release-please-version
kubeVersion: ">=1.31.0-0"
home: https://github.com/drzero42/nexorious
sources:
  - https://github.com/drzero42/nexorious
icon: https://raw.githubusercontent.com/drzero42/nexorious/main/deploy/helm/icon.png
maintainers:
  - name: Nexorious
keywords:
  - games
  - collection
  - self-hosted
dependencies:
  - name: common
    repository: https://bjw-s-labs.github.io/helm-charts/
    version: 5.0.1
