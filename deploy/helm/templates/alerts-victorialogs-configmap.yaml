{{- if and .Values.alerts.enabled .Values.alerts.victoriaLogs.enabled (eq .Values.alerts.victoriaLogs.delivery "configmap") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexorious.fullname" . }}-victorialogs-alerts
  labels:
    app.kubernetes.io/name: {{ include "nexorious.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "nexorious.chart" . }}
    {{- with .Values.alerts.victoriaLogs.ruleLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  victorialogs-rules.yaml: |
{{ .Files.Get "files/victorialogs-rules.yaml" | indent 4 }}
{{- end }}
