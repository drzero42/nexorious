# =============================================================================
# nexorious Helm Chart Values
# =============================================================================
# Based on the bjw-s common library: https://bjw-s-labs.github.io/helm-charts/
#
# Default release name assumed: nexorious
# Install with: helm install nexorious ./charts/nexorious
#
# If using a different release name, set:
#   global.fullnameOverride: nexorious
# =============================================================================

# -- Global values.
# fullnameOverride: set this if installing with a release name other than
# "nexorious" to keep service names predictable (e.g. nexorious-nexorious,
# nexorious-postgresql).
# storageClass: applied to every enabled PVC in `persistence:` that does not
# set its own `storageClass`. Leave empty to fall back to the cluster's
# default StorageClass. Set to "-" to disable dynamic provisioning.
global:
  storageClass: ""

# -- Custom nexorious configuration (not part of the common library)
nexorious:
  # -- At-rest credential encryption key. REQUIRED. Generate with: openssl rand -base64 32
  dbEncryptionKey: "change-me-in-production"

  # -- Supply DB_ENCRYPTION_KEY from an existing Secret instead of inline.
  # -- If set, dbEncryptionKey is ignored.
  dbEncryptionKeyFrom:
    name: ""
    key: ""

  # -- IGDB API client ID. REQUIRED. nexorious will not function without valid IGDB credentials.
  # -- Obtain from: https://api.igdb.com/v4/getting-started
  igdbClientId: ""

  # -- IGDB API client secret. REQUIRED.
  igdbClientSecret: ""

  # -- Database URL. Leave empty to use the in-cluster PostgreSQL controller.
  # -- Set this when disabling the postgresql controller for an external database.
  # -- Example: postgresql://user:pass@my-postgres:5432/nexorious
  databaseUrl: ""

  # -- Legendary work directory. Injected as LEGENDARY_WORK_DIR and mounted
  # -- as an emptyDir volume. Set to empty to disable Epic sync entirely.
  # -- Note: legendary auth state is snapshotted to the database after each
  # -- sync, so the emptyDir is safe to lose on pod restarts — state is
  # -- restored from the DB before every invocation.
  legendaryWorkDir: "/var/lib/legendary"

  # -- Writable /tmp emptyDir for the main container. The main container
  # -- runs with readOnlyRootFilesystem: true, so /tmp must be a separate
  # -- volume. Scheduled and manual backups stage pg_dump output and a copy
  # -- of the cover-art directory here before producing the final archive,
  # -- and restore endpoints buffer uploaded tarballs here before extracting.
  # -- Bump sizeLimit if your cover-art library or restore payloads are
  # -- larger than the default.
  tmpDir:
    sizeLimit: 2Gi

  # -- Annotate the nexorious Deployment with `reloader.stakater.com/auto: "true"`
  # -- so Stakater Reloader (https://github.com/stakater/Reloader), when
  # -- installed in the cluster, restarts the pod whenever a referenced Secret
  # -- or ConfigMap changes (e.g. after rotating IGDB credentials in an
  # -- externally-managed secret). The annotation is inert when Reloader is
  # -- not installed. Applies only to the nexorious controller — never the
  # -- in-cluster PostgreSQL. Set to false if you run Reloader but want to
  # -- control restarts yourself.
  reloader: true

  # -- External secret references (*From pattern)
  # When *From.name and *From.key are both non-empty, the external secret is used
  # and the corresponding inline value is ignored.

  # Non-DB credentials
  igdbClientIdFrom:
    name: ""
    key: ""
  igdbClientSecretFrom:
    name: ""
    key: ""

  # Database: URI mode (single key containing full DATABASE_URL)
  # Mutually exclusive with databaseUrl and db*From.
  databaseUrlFrom:
    name: ""
    key: ""

  # Database: individual keys mode (DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME)
  # Mutually exclusive with databaseUrl and databaseUrlFrom.
  # No inline equivalents — individual keys always come from an external secret.
  dbHostFrom:
    name: ""
    key: ""
  dbPortFrom:
    name: ""
    key: ""
  dbUserFrom:
    name: ""
    key: ""
  dbPasswordFrom:
    name: ""
    key: ""
  dbNameFrom:
    name: ""
    key: ""

  postgresql:
    # -- PostgreSQL username
    username: nexorious
    # -- PostgreSQL password.
    # -- Leave empty (the default) to auto-generate a 32-character random
    # -- password on first install. The generated value is read back from the
    # -- existing credentials Secret on subsequent upgrades, so it remains
    # -- stable. Set explicitly to override.
    # -- The auto-built DATABASE_URL URL-encodes the password, so special
    # -- characters (: @ / ? #) are safe.
    password: ""
    # -- PostgreSQL database name
    database: nexorious

    # -- External secret references for the in-cluster Postgres pod
    # credentials. When *From.name and *From.key are both set, the postgres
    # pod's POSTGRES_USER / POSTGRES_DB / POSTGRES_PASSWORD env vars are
    # sourced from that secret instead of the inline values above. Useful
    # with external-secrets-operator, SealedSecrets, Vault, etc.
    # To connect the nexorious app to the same external secret, also
    # configure nexorious.databaseUrlFrom or nexorious.db*From.
    usernameFrom:
      name: ""
      key: ""
    passwordFrom:
      name: ""
      key: ""
    databaseFrom:
      name: ""
      key: ""

# =============================================================================
# Alert rules (opt-in) — log-based alerting for Loki and/or VictoriaLogs
# =============================================================================
# Wraps the source-of-truth rules in deploy/observability/ into each backend's
# canonical object. All default OFF so a base install stays clean. See
# docs/observability.md for setup and an example Alertmanager route.
alerts:
  # -- Master switch. Must be true for ANY alert object to render.
  enabled: false

  loki:
    # -- Render the Loki ruler ConfigMap (requires alerts.enabled). Your Loki
    # -- ruler must run a sidecar (e.g. kiwigrid/k8s-sidecar) that discovers
    # -- rule ConfigMaps by the label below and loads them into its rule dir.
    enabled: false
    # -- Discovery label the ruler sidecar watches. Default matches the common
    # -- self-configured sidecar convention; the bundled grafana/loki v3 chart
    # -- uses {key: loki.grafana.com/rule, value: "true"} instead — set to match
    # -- your sidecar's label/labelValue.
    ruleLabel:
      key: "loki_rule"
      value: "1"

  victoriaLogs:
    # -- Render VictoriaLogs alert rules (requires alerts.enabled). The form is
    # -- chosen by `delivery` below.
    enabled: false
    # -- How to deliver the rules:
    # --   vmrule    a VMRule CR consumed by the VictoriaMetrics Operator
    # --             (the operator renders it into vmalert's config).
    # --   configmap a plain ConfigMap of the rules file, for those NOT running
    # --             the operator. vmalert has no auto-discovery sidecar like
    # --             Loki's ruler — mount this ConfigMap into your vmalert pod
    # --             and point `-rule` at the mounted victorialogs-rules.yaml;
    # --             trigger reloads via vmalert's /-/reload endpoint.
    delivery: vmrule
    # -- Extra labels on the rendered object. For `vmrule` these let the target
    # -- VMAlert's ruleSelector match it (leave empty if the VMAlert uses
    # -- selectAllByDefault: true). For `configmap` they tag the ConfigMap for
    # -- any sidecar-based discovery you may run.
    ruleLabels: {}

  prometheus:
    # -- Render a PrometheusRule (requires alerts.enabled) for the
    # -- Prometheus Operator / kube-prometheus-stack. The rules query the OTel
    # -- metrics at /metrics (#910). Default off.
    enabled: false
    # -- Extra labels on the PrometheusRule so your Prometheus's ruleSelector
    # -- matches it (e.g. {release: kube-prometheus-stack}). Leave empty if the
    # -- Prometheus selects all PrometheusRules.
    ruleLabels: {}

  victoriaMetrics:
    # -- Render a VMRule (requires alerts.enabled) consumed by the
    # -- VictoriaMetrics Operator (rendered into vmalert). Same rules as the
    # -- PrometheusRule above. Default off.
    enabled: false
    # -- Extra labels on the VMRule so the target VMAlert's ruleSelector matches
    # -- it (leave empty if the VMAlert uses selectAllByDefault: true).
    ruleLabels: {}

# =============================================================================
# ServiceMonitor (opt-in) — Prometheus Operator scrape of /metrics
# =============================================================================
# Native bjw-s common ServiceMonitor (no custom template). Requires the
# Prometheus Operator (kube-prometheus-stack) CRDs in-cluster. Default OFF.
# The default install ships two Services (nexorious + postgresql); automatic
# Service detection only works with exactly one, so the target is named
# explicitly via service.identifier (a harmless no-op if you disable postgresql).
serviceMonitor:
  main:
    # -- Render a ServiceMonitor scraping the nexorious Service /metrics. Default off.
    enabled: false
    # -- Target the nexorious Service explicitly (not the bundled postgresql one).
    service:
      identifier: nexorious
    # -- Scrape endpoints. The nexorious Service exposes the app on the `http`
    # -- port (8000); metrics are served unauthenticated at /metrics.
    endpoints:
      - port: http
        scheme: http
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s

# =============================================================================
# Grafana dashboard (opt-in) — the committed nexorious dashboard JSON
# =============================================================================
# Renders the single-source-of-truth dashboard (deploy/observability/
# nexorious-dashboard.json) for in-cluster Grafana. Default OFF.
dashboard:
  # -- Master switch for the dashboard object.
  enabled: false
  # -- How to deliver the dashboard:
  # --   configmap  a ConfigMap labeled `grafana_dashboard: "1"` that the
  # --              Grafana sidecar (kube-prometheus-stack default) auto-discovers.
  # --   crd        a GrafanaDashboard CR (grafana.integreatly.org/v1beta1) for
  # --              grafana-operator users. NOTE: requires the CRD installed
  # --              in-cluster or `helm install/upgrade` fails on the unknown
  # --              kind (`helm template`/`lint` are unaffected) — hence the
  # --              configmap default.
  mode: configmap
  # -- Extra labels on the rendered object (e.g. to target a specific sidecar
  # -- or Grafana folder). For configmap mode the grafana_dashboard label is
  # -- always added regardless of this.
  labels: {}
  # -- (crd mode only) instanceSelector matching the grafana-operator Grafana CR.
  instanceSelector:
    matchLabels:
      dashboards: grafana

# =============================================================================
# Default Pod options (applied to all controllers unless overridden)
# =============================================================================

# -- Default pod-level options for all controllers. Per-controller overrides
# -- (e.g. controllers.postgresql.pod.securityContext) take precedence.
defaultPodOptions:
  securityContext:
    # The nexorious image runs as the unprivileged 'nexorious' user pinned to
    # UID/GID 10001. fsGroup ensures mounted PVCs are chown'd so the binary
    # can write to /app/storage.
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    fsGroupChangePolicy: OnRootMismatch

# =============================================================================
# Controllers
# =============================================================================

controllers:
  # ---------------------------------------------------------------------------
  # PostgreSQL -- in-cluster database (StatefulSet)
  # To use an external database, disable ALL three postgresql resources and
  # provide nexorious.databaseUrl:
  #   controllers.postgresql.enabled: false
  #   service.postgresql.enabled: false
  #   persistence.postgresql-data.enabled: false
  #   nexorious.databaseUrl: "postgresql://user:pass@host:5432/dbname"
  # ---------------------------------------------------------------------------
  postgresql:
    enabled: true
    type: statefulset
    # The official postgres image expects to run as UID 999 (the 'postgres'
    # user it creates). Override the default pod securityContext for this
    # controller only.
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
    containers:
      main:
        image:
          repository: postgres
          # -- PostgreSQL image tag. Change to use a different version.
          tag: 18-alpine
          pullPolicy: IfNotPresent
        env:
          POSTGRES_USER:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.postgresUsernameSecretName" . }}'
                key: '{{ include "nexorious.postgresUsernameSecretKey" . }}'
          POSTGRES_DB:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.postgresDatabaseSecretName" . }}'
                key: '{{ include "nexorious.postgresDatabaseSecretKey" . }}'
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.postgresPasswordSecretName" . }}'
                key: '{{ include "nexorious.postgresPasswordSecretKey" . }}'
          PGDATA: /var/lib/postgresql/data/pgdata
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        # -- Default resources for the postgres container. Operators should
        # -- override these for production workloads.
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 256Mi
        probes:
          # pg_isready is invoked via 'sh -c' so $POSTGRES_USER expands at
          # runtime — works whether the env var is sourced inline or from an
          # external secret via nexorious.postgresql.usernameFrom.
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - sh
                  - -c
                  - 'pg_isready -U "$POSTGRES_USER"'
              initialDelaySeconds: 10
              periodSeconds: 10
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - sh
                  - -c
                  - 'pg_isready -U "$POSTGRES_USER"'
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 5
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - sh
                  - -c
                  - 'pg_isready -U "$POSTGRES_USER"'
              failureThreshold: 30
              periodSeconds: 5

  # ---------------------------------------------------------------------------
  # nexorious
  # A 'migrate' initContainer applies pending migrations before the main
  # container starts serving HTTP.
  # ---------------------------------------------------------------------------
  nexorious:
    type: deployment
    replicas: 1
    # The storage PVC is ReadWriteOnce (node-scoped). The default
    # RollingUpdate strategy starts the new pod before the old one stops;
    # if the scheduler places it on a different node the volume cannot
    # attach and the rollout deadlocks (Multi-Attach error). Recreate
    # terminates the old pod first, at the cost of a brief downtime
    # window during upgrades.
    strategy: Recreate
    initContainers:
      migrate:
        image:
          repository: ghcr.io/drzero42/nexorious
          tag: "{{ .Chart.AppVersion }}"
          pullPolicy: IfNotPresent
        command:
          - /app/nexorious
          - migrate
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        # -- Default resources for the migrate initContainer. Operators
        # -- should override these for production workloads.
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 128Mi
        env:
          LOG_LEVEL: info
          DEBUG: "false"
          DB_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbEncryptionKeySecretName" . }}'
                key: '{{ include "nexorious.dbEncryptionKeySecretKey" . }}'
          IGDB_CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.igdbClientIdSecretName" . }}'
                key: '{{ include "nexorious.igdbClientIdSecretKey" . }}'
          IGDB_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.igdbClientSecretSecretName" . }}'
                key: '{{ include "nexorious.igdbClientSecretSecretKey" . }}'
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.databaseUrlSecretName" . }}'
                key: '{{ include "nexorious.databaseUrlSecretKey" . }}'
                optional: true
          DB_HOST:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbHostSecretName" . }}'
                key: '{{ include "nexorious.dbHostSecretKey" . }}'
                optional: true
          DB_PORT:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbPortSecretName" . }}'
                key: '{{ include "nexorious.dbPortSecretKey" . }}'
                optional: true
          DB_USER:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbUserSecretName" . }}'
                key: '{{ include "nexorious.dbUserSecretKey" . }}'
                optional: true
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbPasswordSecretName" . }}'
                key: '{{ include "nexorious.dbPasswordSecretKey" . }}'
                optional: true
          DB_NAME:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbNameSecretName" . }}'
                key: '{{ include "nexorious.dbNameSecretKey" . }}'
                optional: true
    containers:
      main:
        image:
          repository: ghcr.io/drzero42/nexorious
          tag: "{{ .Chart.AppVersion }}"
          pullPolicy: IfNotPresent
        command:
          - /app/nexorious
          - serve
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        # -- Default resources for the nexorious main container. Operators
        # -- should override these for production workloads.
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 256Mi
        env:
          PORT: "8000"
          STORAGE_PATH: /app/storage
          BACKUP_PATH: /app/storage/backups
          LOG_LEVEL: info
          DEBUG: "false"
          RATE_LIMITER_BACKEND: postgres
          # Observability. Prometheus metrics are exposed at /metrics (on by
          # default; see the ServiceMonitor work in #912). pprof stays off and
          # would only ever bind loopback — never expose it via a Service.
          OTEL_SERVICE_NAME: nexorious
          OTEL_METRICS_ENABLED: "true"
          PPROF_ENABLED: "false"
          PPROF_ADDR: "127.0.0.1:6060"
          # Opt-in OTLP trace export — uncomment and point at your collector's
          # OTLP/HTTP endpoint to enable tracing (see the admin guide). Tune
          # sampling with the standard OTEL_TRACES_SAMPLER(_ARG) vars.
          # OTEL_EXPORTER_OTLP_ENDPOINT: http://collector.monitoring:4318
          # OTEL_TRACES_SAMPLER: parentbased_traceidratio
          # OTEL_TRACES_SAMPLER_ARG: "0.25"
          DB_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbEncryptionKeySecretName" . }}'
                key: '{{ include "nexorious.dbEncryptionKeySecretKey" . }}'
          IGDB_CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.igdbClientIdSecretName" . }}'
                key: '{{ include "nexorious.igdbClientIdSecretKey" . }}'
          IGDB_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.igdbClientSecretSecretName" . }}'
                key: '{{ include "nexorious.igdbClientSecretSecretKey" . }}'
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.databaseUrlSecretName" . }}'
                key: '{{ include "nexorious.databaseUrlSecretKey" . }}'
                optional: true
          DB_HOST:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbHostSecretName" . }}'
                key: '{{ include "nexorious.dbHostSecretKey" . }}'
                optional: true
          DB_PORT:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbPortSecretName" . }}'
                key: '{{ include "nexorious.dbPortSecretKey" . }}'
                optional: true
          DB_USER:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbUserSecretName" . }}'
                key: '{{ include "nexorious.dbUserSecretKey" . }}'
                optional: true
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbPasswordSecretName" . }}'
                key: '{{ include "nexorious.dbPasswordSecretKey" . }}'
                optional: true
          DB_NAME:
            valueFrom:
              secretKeyRef:
                name: '{{ include "nexorious.dbNameSecretName" . }}'
                key: '{{ include "nexorious.dbNameSecretKey" . }}'
                optional: true
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 15
              periodSeconds: 10
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 10
              periodSeconds: 10
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 15
              failureThreshold: 30
              periodSeconds: 5

# =============================================================================
# Services
# =============================================================================

service:
  nexorious:
    controller: nexorious
    ports:
      http:
        port: 8000

  postgresql:
    controller: postgresql
    ports:
      postgresql:
        port: 5432

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- nexorious ingress (also serves the SPA at /)
  # Enable and configure hosts to expose the app via an ingress controller.
  # The nexorious service handles both API routes (/api) and the SPA
  # (all other paths) since the Go binary embeds the React SPA.
  nexorious:
    enabled: false
    # -- Ingress class name (e.g. nginx, traefik, etc.)
    className: ""
    annotations: {}
    hosts:
      - host: nexorious.example.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: nexorious
              port: http
    tls: []

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Main storage volume for cover art, uploads, and backups.
  # Mounted only on the nexorious controller (single deployment).
  # By default, backups are stored under /app/storage/backups on this same PVC.
  # To use separate storage for backups (e.g. NFS), add another persistence entry:
  #
  #   backups:
  #     enabled: true
  #     type: nfs
  #     server: nas.local
  #     path: /backups/nexorious
  #     advancedMounts:
  #       nexorious:
  #         main:
  #           - path: /app/storage/backups
  storage:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    advancedMounts:
      nexorious:
        main:
          - path: /app/storage

  # -- PostgreSQL data volume
  postgresql-data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 8Gi
    advancedMounts:
      postgresql:
        main:
          - path: /var/lib/postgresql/data
