<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Primary Meta Tags -->
		<title>Nexorious - Game Collection Management</title>
		<meta name="title" content="Nexorious - Game Collection Management" />
		<meta name="description" content="Self-hosted game collection management service for organizing and tracking your personal video game library." />
		
		
		<!-- Security Headers -->
		<meta http-equiv="X-Content-Type-Options" content="nosniff" />
		<meta http-equiv="X-Frame-Options" content="DENY" />
		<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
		<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Nexorious - Game Collection Management" />
		<meta property="og:description" content="Self-hosted game collection management service for organizing and tracking your personal video game library." />
		<meta property="og:site_name" content="Nexorious" />
		
		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:title" content="Nexorious - Game Collection Management" />
		<meta property="twitter:description" content="Self-hosted game collection management service for organizing and tracking your personal video game library." />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
