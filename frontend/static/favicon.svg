<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#gradient)" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Game controller shape -->
  <g transform="translate(64,64)">
    <!-- Main controller body -->
    <rect x="-24" y="-12" width="48" height="24" rx="8" fill="#ffffff" opacity="0.95"/>
    
    <!-- D-pad -->
    <g transform="translate(-16,0)">
      <rect x="-1" y="-6" width="2" height="12" fill="#3b82f6"/>
      <rect x="-6" y="-1" width="12" height="2" fill="#3b82f6"/>
    </g>
    
    <!-- Action buttons -->
    <g transform="translate(16,0)">
      <circle cx="-4" cy="-4" r="2" fill="#3b82f6"/>
      <circle cx="4" cy="-4" r="2" fill="#3b82f6"/>
      <circle cx="-4" cy="4" r="2" fill="#3b82f6"/>
      <circle cx="4" cy="4" r="2" fill="#3b82f6"/>
    </g>
    
    <!-- Shoulder buttons -->
    <rect x="-28" y="-14" width="8" height="4" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="20" y="-14" width="8" height="4" rx="2" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>