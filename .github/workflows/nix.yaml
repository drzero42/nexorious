---
name: Nix Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'go.sum'
      - 'ui/frontend/package-lock.json'
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'
  push:
    branches: [main]
    paths:
      - 'go.sum'
      - 'ui/frontend/package-lock.json'
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: nix build .#nexorious
