---
name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache PostgreSQL 18 client packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/apt-archives
          key: apt-pgclient18-${{ runner.os }}

      - name: Install PostgreSQL 18 client
        run: |
          set -euo pipefail
          # curl and ca-certificates are preinstalled on ubuntu-latest, so we
          # skip an apt install for them.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          # Refresh only the PGDG source list, not every Ubuntu mirror — the
          # base package lists already present on the runner image satisfy the
          # transitive dependencies. A full `apt-get update` here costs ~10s.
          sudo apt-get update \
            -o Dir::Etc::sourcelist="sources.list.d/pgdg.list" \
            -o Dir::Etc::sourceparts="-" \
            -o APT::Get::List-Cleanup="0"
          # Use a workspace-local archive dir so actions/cache can persist the
          # downloaded .deb files (and their dependencies) between runs.
          ARCHIVES="$GITHUB_WORKSPACE/apt-archives"
          mkdir -p "$ARCHIVES/partial"
          sudo apt-get install -y \
            -o Dir::Cache::archives="$ARCHIVES" \
            postgresql-client-18
          # Make the cached debs readable by the (non-root) runner user so the
          # cache save step can pack them.
          sudo chown -R "$(id -u):$(id -g)" "$ARCHIVES"

      - name: Cache Postgres test image
        id: pg-image
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.docker-cache/postgres-18-alpine.tar
          key: docker-postgres-18-alpine

      - name: Load or pull Postgres test image
        run: |
          set -euo pipefail
          TAR="$GITHUB_WORKSPACE/.docker-cache/postgres-18-alpine.tar"
          if [ -f "$TAR" ]; then
            docker load -i "$TAR"
          else
            docker pull postgres:18-alpine
            mkdir -p "$(dirname "$TAR")"
            docker save postgres:18-alpine -o "$TAR"
          fi

      - name: Run Go tests
        env:
          # Tests use testcontainers to spin up their own PostgreSQL container.
          # Point testcontainers at the Docker daemon available on GitHub-hosted runners.
          DOCKER_HOST: unix:///var/run/docker.sock
        run: go test -timeout 600s ./...

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install dependencies
        run: cd ui/frontend && npm ci

      - name: Run frontend tests
        run: cd ui/frontend && npm run test

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install dependencies
        run: cd ui/frontend && npm ci

      - name: Type check and lint
        run: cd ui/frontend && npm run check

      - name: Knip (dead code)
        run: cd ui/frontend && npm run knip

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Cache Helm chart dependencies
        uses: actions/cache@v5
        with:
          path: |
            deploy/helm/charts
            ~/.cache/helm
          key: helm-deps-${{ hashFiles('deploy/helm/Chart.lock') }}

      - name: Add bjw-s Helm repo
        run: helm repo add bjw-s https://bjw-s-labs.github.io/helm-charts/

      - name: Build Helm dependencies
        run: helm dependency build deploy/helm/

      - name: Lint Helm chart
        run: |
          # Lint twice to exercise both VictoriaLogs delivery modes (the default
          # vmrule, and the no-operator configmap variant).
          for vl_delivery in vmrule configmap; do
            helm lint --strict deploy/helm/ \
              --set nexorious.dbEncryptionKey=x \
              --set nexorious.postgresql.password=x \
              --set nexorious.igdbClientId=x \
              --set nexorious.igdbClientSecret=x \
              --set alerts.enabled=true \
              --set alerts.loki.enabled=true \
              --set alerts.victoriaLogs.enabled=true \
              --set alerts.victoriaLogs.delivery=$vl_delivery \
              --set alerts.prometheus.enabled=true \
              --set alerts.victoriaMetrics.enabled=true \
              --set serviceMonitor.main.enabled=true \
              --set dashboard.enabled=true
          done
