---
name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexorious_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend
          uv sync --dev

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexorious_test
        run: |
          cd backend
          uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          # TODO: re-enable thresholds once test coverage catches up with the codebase
          # npm run test:coverage -- \
          #   --coverage.thresholds.lines=70 \
          #   --coverage.thresholds.functions=70 \
          #   --coverage.thresholds.branches=70 \
          #   --coverage.thresholds.statements=70
          npm run test:coverage

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build (generates routeTree.gen.ts) and type check
        # `npm run build` runs `vite build && tsc --noEmit`. The vite build step triggers
        # the TanStack Router plugin to generate src/routeTree.gen.ts (gitignored),
        # which tsc requires. Running `npm run check` alone would fail without it.
        run: cd frontend && npm run build
