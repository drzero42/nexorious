---
name: Build and Push Container Image

on:
  schedule:
    # Nightly at 02:00 UTC. The exact minute is intentionally not :00 in GitHub's
    # docs ("we recommend not running on the hour, since traffic spikes there"),
    # but :00 is fine for a low-traffic repo and matches the spec verbatim.
    - cron: '0 2 * * *'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  pre-check:
    name: Pre-check
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine if a build is needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Non-schedule triggers always build. workflow_dispatch is the manual
          # escape hatch; release builds must always run regardless of API state.
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Trigger=${{ github.event_name }} -> always build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "HEAD short SHA: $SHORT_SHA"

          # Query GHCR for any existing image version whose tag ends with the
          # current HEAD short SHA. The tag format is YYYYMMDD-<short-sha>, so
          # matching the suffix is sufficient and tolerant of a date rollover.
          # Fail-open: if the API call itself fails (rate limit, transient 5xx),
          # default to building rather than silently skipping the nightly.
          if ! MATCHES=$(gh api \
            -H "Accept: application/vnd.github+json" \
            --paginate \
            "/users/drzero42/packages/container/nexorious/versions" \
            --jq "[.[] | (.metadata.container.tags // [])[]] | map(select(endswith(\"-${SHORT_SHA}\"))) | length"); then
            echo "::warning::gh api call failed; defaulting to should_build=true"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found ${MATCHES} existing tag(s) ending in -${SHORT_SHA}"
          if [[ "${MATCHES}" -gt 0 ]]; then
            echo "Image for HEAD already built; skipping downstream jobs."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No existing image for HEAD; will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.should_build == 'true'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/drzero42/nexorious
          tags: |
            # Release tags: v1.2.3 → 1.2.3
            type=semver,pattern={{version}}
            # Main branch builds: YYYYMMDD-<short-sha> + dev
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-chart:
    name: Build and Push Helm Chart
    runs-on: ubuntu-latest
    needs: build-push

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute chart version
        id: chart-version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            APP_VERSION="$VERSION"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            VERSION="0.0.0-dev-${DATE}-${SHORT_SHA}"
            APP_VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Add bjw-s Helm repo
        run: helm repo add bjw-s https://bjw-s-labs.github.io/helm-charts/

      - name: Build Helm dependencies
        run: helm dependency update deploy/helm/

      - name: Package Helm chart
        id: helm-package
        run: |
          PKG=$(helm package deploy/helm/ \
            --version "${{ steps.chart-version.outputs.version }}" \
            --app-version "${{ steps.chart-version.outputs.app_version }}" \
            | awk '{print $NF}')
          echo "path=$PKG" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Push Helm chart
        run: helm push "${{ steps.helm-package.outputs.path }}" oci://ghcr.io/drzero42/charts

      - name: Push Helm chart (moving dev tag)
        if: github.event_name != 'release'
        run: |
          PKG=$(helm package deploy/helm/ \
            --version "0.0.0-dev" \
            --app-version "dev" \
            | awk '{print $NF}')
          helm push "$PKG" oci://ghcr.io/drzero42/charts

  cleanup:
    name: Cleanup old dev versions
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name != 'release'

    permissions:
      packages: write

    steps:
      - name: Delete old dev container image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: nexorious
          package-type: container
          min-versions-to-keep: 30
          # Never delete release images (semver: 1.2.3) or the floating 'dev' tag.
          # Everything else (YYYYMMDD-<sha> dev builds) is subject to the
          # min-versions-to-keep cap.
          ignore-versions: '^(\d+\.\d+\.\d+|dev)$'

      - name: Delete old dev Helm chart versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: charts/nexorious
          package-type: container
          min-versions-to-keep: 30
          # Protect release charts (semver) and the moving '0.0.0-dev' tag.
          # 0.0.0-dev-YYYYMMDD-<sha> dev versions are subject to the cap.
          ignore-versions: '^(\d+\.\d+\.\d+|0\.0\.0-dev)$'
