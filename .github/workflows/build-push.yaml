---
name: Build and Push Container Image

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yaml

  build-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/drzero42/nexorious
          tags: |
            # Release tags: v1.2.3 → 1.2.3 + latest
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            # Main branch builds: YYYYMMDD-<short-sha> + dev
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-chart:
    name: Build and Push Helm Chart
    runs-on: ubuntu-latest
    needs: build-push

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute chart version
        id: chart-version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            APP_VERSION="$VERSION"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            VERSION="0.0.0-dev-${DATE}-${SHORT_SHA}"
            APP_VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Build Helm dependencies
        run: helm dependency update deploy/helm/

      - name: Package Helm chart
        run: |
          helm package deploy/helm/ \
            --version ${{ steps.chart-version.outputs.version }} \
            --app-version ${{ steps.chart-version.outputs.app_version }}

      - name: Log in to ghcr.io (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Push Helm chart
        run: helm push nexorious-*.tgz oci://ghcr.io/drzero42/charts
