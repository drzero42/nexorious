<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Main Container -->
  <rect x="50" y="50" width="1100" height="700" fill="white" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="1100" height="60" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0 0 1 0"/>
  <text x="80" y="80" fill="#343a40" font-size="20" font-weight="bold">Rating & Tagging</text>
  <text x="80" y="95" fill="#6c757d" font-size="14">Rate your games and organize them with custom tags</text>
  
  <!-- Game Info Header -->
  <g transform="translate(80, 130)">
    <!-- Game Cover -->
    <rect x="0" y="0" width="80" height="100" rx="4" fill="#e9ecef"/>
    <text x="40" y="55" text-anchor="middle" fill="#6c757d" font-size="10">IMG</text>
    
    <!-- Game Title -->
    <text x="100" y="25" fill="#343a40" font-size="18" font-weight="bold">Baldur's Gate 3</text>
    <text x="100" y="45" fill="#6c757d" font-size="14">Larian Studios • 2023</text>
    <text x="100" y="65" fill="#6c757d" font-size="12">RPG, Strategy • PC (Steam)</text>
    
    <!-- Current Rating -->
    <text x="400" y="25" fill="#6c757d" font-size="12">Current Rating: </text>
    <text x="490" y="25" fill="#ffc107" font-size="16">⭐⭐⭐⭐⭐</text>
    <text x="600" y="25" fill="#dc3545" font-size="16">❤️ Loved</text>
    
    <!-- Current Tags -->
    <text x="400" y="50" fill="#6c757d" font-size="12">Tags: </text>
    <rect x="440" y="38" width="40" height="18" rx="9" fill="#007bff"/>
    <text x="460" y="50" text-anchor="middle" fill="white" font-size="10">RPG</text>
    <rect x="490" y="38" width="50" height="18" rx="9" fill="#28a745"/>
    <text x="515" y="50" text-anchor="middle" fill="white" font-size="10">Fantasy</text>
    <rect x="550" y="38" width="60" height="18" rx="9" fill="#ffc107"/>
    <text x="580" y="50" text-anchor="middle" fill="white" font-size="10">Story-rich</text>
  </g>
  
  <!-- Rating Section -->
  <g transform="translate(80, 260)">
    <rect x="0" y="0" width="520" height="200" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="20" y="30" fill="#343a40" font-size="16" font-weight="bold">Personal Rating</text>
    
    <!-- Star Rating -->
    <g transform="translate(20, 50)">
      <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">RATE THIS GAME</text>
      
      <!-- Stars -->
      <g transform="translate(0, 20)">
        <text x="0" y="0" fill="#ffc107" font-size="32" style="cursor: pointer;">⭐</text>
        <text x="40" y="0" fill="#ffc107" font-size="32" style="cursor: pointer;">⭐</text>
        <text x="80" y="0" fill="#ffc107" font-size="32" style="cursor: pointer;">⭐</text>
        <text x="120" y="0" fill="#ffc107" font-size="32" style="cursor: pointer;">⭐</text>
        <text x="160" y="0" fill="#ffc107" font-size="32" style="cursor: pointer;">⭐</text>
        <text x="220" y="0" fill="#343a40" font-size="16">5.0 / 5</text>
        
        <!-- Hover effect indicator -->
        <rect x="0" y="40" width="200" height="20" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1" opacity="0"/>
        <text x="10" y="55" fill="#856404" font-size="12" opacity="0">Click to rate</text>
      </g>
    </g>
    
    <!-- Loved Toggle -->
    <g transform="translate(20, 120)">
      <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">LOVED GAME</text>
      
      <!-- Toggle Switch -->
      <rect x="0" y="15" width="60" height="30" rx="15" fill="#dc3545"/>
      <circle cx="45" cy="30" r="12" fill="white"/>
      <text x="-5" y="35" fill="#dc3545" font-size="16">❤️</text>
      <text x="70" y="35" fill="#dc3545" font-size="14" font-weight="500">Loved</text>
      
      <!-- Off state (hidden) -->
      <rect x="0" y="15" width="60" height="30" rx="15" fill="#ced4da" opacity="0"/>
      <circle cx="15" cy="30" r="12" fill="white" opacity="0"/>
      <text x="70" y="35" fill="#6c757d" font-size="14" opacity="0">Not Loved</text>
    </g>
    
    <!-- Rating Statistics -->
    <g transform="translate(300, 50)">
      <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">RATING BREAKDOWN</text>
      
      <!-- Personal vs Global -->
      <text x="0" y="25" fill="#6c757d" font-size="12">Your Rating: </text>
      <text x="90" y="25" fill="#343a40" font-size="12" font-weight="bold">5.0 / 5</text>
      
      <text x="0" y="45" fill="#6c757d" font-size="12">Global Average: </text>
      <text x="90" y="45" fill="#343a40" font-size="12" font-weight="bold">4.6 / 5</text>
      
      <text x="0" y="65" fill="#6c757d" font-size="12">Metacritic: </text>
      <text x="90" y="65" fill="#343a40" font-size="12" font-weight="bold">96 / 100</text>
      
      <!-- Rating History -->
      <text x="0" y="95" fill="#6c757d" font-size="12">Rated on: </text>
      <text x="90" y="95" fill="#343a40" font-size="12">Oct 15, 2023</text>
      
      <text x="0" y="115" fill="#6c757d" font-size="12">Previous: </text>
      <text x="90" y="115" fill="#6c757d" font-size="12">4.0 / 5</text>
    </g>
  </g>
  
  <!-- Tagging Section -->
  <g transform="translate(620, 260)">
    <rect x="0" y="0" width="500" height="350" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="20" y="30" fill="#343a40" font-size="16" font-weight="bold">Tags</text>
    
    <!-- Current Tags -->
    <text x="20" y="60" fill="#6c757d" font-size="12" font-weight="500">CURRENT TAGS</text>
    
    <g transform="translate(20, 75)">
      <!-- Tag 1 -->
      <rect x="0" y="0" width="50" height="24" rx="12" fill="#007bff"/>
      <text x="25" y="16" text-anchor="middle" fill="white" font-size="10" font-weight="500">RPG</text>
      <circle cx="42" cy="8" r="6" fill="#0056b3"/>
      <text x="39" y="12" fill="white" font-size="8">×</text>
      
      <!-- Tag 2 -->
      <rect x="60" y="0" width="60" height="24" rx="12" fill="#28a745"/>
      <text x="90" y="16" text-anchor="middle" fill="white" font-size="10" font-weight="500">Fantasy</text>
      <circle cx="112" cy="8" r="6" fill="#1e7e34"/>
      <text x="109" y="12" fill="white" font-size="8">×</text>
      
      <!-- Tag 3 -->
      <rect x="130" y="0" width="70" height="24" rx="12" fill="#ffc107"/>
      <text x="165" y="16" text-anchor="middle" fill="white" font-size="10" font-weight="500">Story-rich</text>
      <circle cx="192" cy="8" r="6" fill="#d39e00"/>
      <text x="189" y="12" fill="white" font-size="8">×</text>
      
      <!-- Tag 4 -->
      <rect x="210" y="0" width="70" height="24" rx="12" fill="#6f42c1"/>
      <text x="245" y="16" text-anchor="middle" fill="white" font-size="10" font-weight="500">Turn-based</text>
      <circle cx="272" cy="8" r="6" fill="#5a2d91"/>
      <text x="269" y="12" fill="white" font-size="8">×</text>
      
      <!-- Tag 5 -->
      <rect x="290" y="0" width="50" height="24" rx="12" fill="#17a2b8"/>
      <text x="315" y="16" text-anchor="middle" fill="white" font-size="10" font-weight="500">Co-op</text>
      <circle cx="332" cy="8" r="6" fill="#117a8b"/>
      <text x="329" y="12" fill="white" font-size="8">×</text>
    </g>
    
    <!-- Add New Tag -->
    <text x="20" y="125" fill="#6c757d" font-size="12" font-weight="500">ADD NEW TAG</text>
    <rect x="20" y="140" width="300" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="30" y="160" fill="#6c757d" font-size="14">Type a tag name...</text>
    
    <!-- Add Button -->
    <rect x="330" y="140" width="60" height="30" rx="4" fill="#28a745"/>
    <text x="360" y="160" text-anchor="middle" fill="white" font-size="12">Add</text>
    
    <!-- Tag Color Picker -->
    <text x="20" y="190" fill="#6c757d" font-size="12" font-weight="500">TAG COLOR</text>
    <g transform="translate(20, 205)">
      <circle cx="15" cy="15" r="12" fill="#007bff" stroke="#fff" stroke-width="2"/>
      <circle cx="45" cy="15" r="12" fill="#28a745" stroke="#dee2e6" stroke-width="2"/>
      <circle cx="75" cy="15" r="12" fill="#ffc107" stroke="#dee2e6" stroke-width="2"/>
      <circle cx="105" cy="15" r="12" fill="#dc3545" stroke="#dee2e6" stroke-width="2"/>
      <circle cx="135" cy="15" r="12" fill="#6f42c1" stroke="#dee2e6" stroke-width="2"/>
      <circle cx="165" cy="15" r="12" fill="#17a2b8" stroke="#dee2e6" stroke-width="2"/>
      <circle cx="195" cy="15" r="12" fill="#fd7e14" stroke="#dee2e6" stroke-width="2"/>
      <circle cx="225" cy="15" r="12" fill="#6c757d" stroke="#dee2e6" stroke-width="2"/>
    </g>
    
    <!-- Popular Tags -->
    <text x="20" y="260" fill="#6c757d" font-size="12" font-weight="500">POPULAR TAGS</text>
    
    <g transform="translate(20, 275)">
      <!-- Popular tag suggestions -->
      <rect x="0" y="0" width="50" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="25" y="13" text-anchor="middle" fill="#6c757d" font-size="10">Action</text>
      
      <rect x="60" y="0" width="60" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="90" y="13" text-anchor="middle" fill="#6c757d" font-size="10">Adventure</text>
      
      <rect x="130" y="0" width="50" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="155" y="13" text-anchor="middle" fill="#6c757d" font-size="10">Puzzle</text>
      
      <rect x="190" y="0" width="50" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="215" y="13" text-anchor="middle" fill="#6c757d" font-size="10">Indie</text>
      
      <rect x="250" y="0" width="60" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="280" y="13" text-anchor="middle" fill="#6c757d" font-size="10">Multiplayer</text>
      
      <rect x="0" y="30" width="50" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="25" y="43" text-anchor="middle" fill="#6c757d" font-size="10">Horror</text>
      
      <rect x="60" y="30" width="60" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="90" y="43" text-anchor="middle" fill="#6c757d" font-size="10">Open World</text>
      
      <rect x="130" y="30" width="50" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="155" y="43" text-anchor="middle" fill="#6c757d" font-size="10">Retro</text>
      
      <rect x="190" y="30" width="50" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
      <text x="215" y="43" text-anchor="middle" fill="#6c757d" font-size="10">Casual</text>
    </g>
  </g>
  
  <!-- Tag Management -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="520" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="20" y="30" fill="#343a40" font-size="16" font-weight="bold">Tag Management</text>
    
    <!-- Filter by Tags -->
    <text x="20" y="60" fill="#6c757d" font-size="12" font-weight="500">FILTER LIBRARY BY TAGS</text>
    <rect x="20" y="75" width="300" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="30" y="95" fill="#6c757d" font-size="14">Select tags to filter...</text>
    
    <!-- Tag Statistics -->
    <text x="350" y="60" fill="#6c757d" font-size="12" font-weight="500">TAG STATISTICS</text>
    <text x="350" y="80" fill="#343a40" font-size="12">Total tags: 47</text>
    <text x="350" y="95" fill="#343a40" font-size="12">Most used: RPG (23 games)</text>
    
    <!-- Manage Tags Button -->
    <rect x="400" y="75" width="100" height="30" rx="4" fill="#007bff"/>
    <text x="450" y="95" text-anchor="middle" fill="white" font-size="12">Manage Tags</text>
  </g>
  
  <!-- Action Buttons -->
  <g transform="translate(80, 640)">
    <!-- Save Changes -->
    <rect x="0" y="0" width="120" height="40" rx="4" fill="#28a745"/>
    <text x="60" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="500">Save Changes</text>
    
    <!-- Clear Rating -->
    <rect x="140" y="0" width="120" height="40" rx="4" fill="#dc3545"/>
    <text x="200" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="500">Clear Rating</text>
    
    <!-- Bulk Tag -->
    <rect x="280" y="0" width="120" height="40" rx="4" fill="#007bff"/>
    <text x="340" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="500">Bulk Tag</text>
    
    <!-- Export Tags -->
    <rect x="420" y="0" width="120" height="40" rx="4" fill="#6c757d"/>
    <text x="480" y="25" text-anchor="middle" fill="white" font-size="14">Export Tags</text>
  </g>
  
  <!-- Tag Creation Modal -->
  <g id="tag-creation-modal" opacity="0">
    <rect x="0" y="0" width="1200" height="800" fill="rgba(0,0,0,0.5)"/>
    <rect x="400" y="250" width="400" height="300" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <text x="600" y="280" text-anchor="middle" fill="#343a40" font-size="18" font-weight="bold">Create New Tag</text>
    
    <!-- Tag Name -->
    <text x="430" y="320" fill="#6c757d" font-size="12" font-weight="500">TAG NAME</text>
    <rect x="430" y="330" width="340" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="440" y="352" fill="#343a40" font-size="14">Difficult</text>
    
    <!-- Tag Description -->
    <text x="430" y="390" fill="#6c757d" font-size="12" font-weight="500">DESCRIPTION (Optional)</text>
    <rect x="430" y="400" width="340" height="60" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="440" y="420" fill="#6c757d" font-size="14">Games that are challenging...</text>
    
    <!-- Color Selection -->
    <text x="430" y="485" fill="#6c757d" font-size="12" font-weight="500">COLOR</text>
    <g transform="translate(430, 495)">
      <circle cx="15" cy="15" r="12" fill="#dc3545" stroke="#fff" stroke-width="2"/>
      <circle cx="45" cy="15" r="12" fill="#ffc107" stroke="#dee2e6" stroke-width="2"/>
      <circle cx="75" cy="15" r="12" fill="#28a745" stroke="#dee2e6" stroke-width="2"/>
    </g>
    
    <!-- Modal Buttons -->
    <rect x="580" y="520" width="80" height="30" rx="4" fill="#28a745"/>
    <text x="620" y="539" text-anchor="middle" fill="white" font-size="12">Create</text>
    
    <rect x="680" y="520" width="80" height="30" rx="4" fill="#6c757d"/>
    <text x="720" y="539" text-anchor="middle" fill="white" font-size="12">Cancel</text>
  </g>
  
  <!-- Rating Animation -->
  <g id="rating-animation" opacity="0">
    <text x="300" y="350" text-anchor="middle" fill="#ffc107" font-size="48">⭐</text>
    <text x="300" y="380" text-anchor="middle" fill="#343a40" font-size="16" font-weight="bold">Rated 5 stars!</text>
    <animateTransform attributeName="transform" type="scale" dur="0.5s" values="0.5;1.2;1" begin="0s"/>
    <animate attributeName="opacity" dur="1.5s" values="0;1;1;0" begin="0s"/>
  </g>
  
  <!-- Annotations -->
  <g fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" font-size="12">
    <!-- Star rating annotation -->
    <line x1="300" y1="310" x2="360" y2="310" stroke-dasharray="2,2"/>
    <text x="370" y="310" fill="#ff6b6b">Interactive stars</text>
    <text x="370" y="325" fill="#ff6b6b">Hover preview</text>
    
    <!-- Loved toggle annotation -->
    <line x1="150" y1="390" x2="200" y2="390" stroke-dasharray="2,2"/>
    <text x="210" y="390" fill="#ff6b6b">Special designation</text>
    <text x="210" y="405" fill="#ff6b6b">Filtering option</text>
    
    <!-- Tag colors annotation -->
    <line x1="840" y1="465" x2="900" y2="465" stroke-dasharray="2,2"/>
    <text x="910" y="465" fill="#ff6b6b">Color-coded tags</text>
    <text x="910" y="480" fill="#ff6b6b">Visual organization</text>
    
    <!-- Tag management annotation -->
    <line x1="500" y1="545" x2="560" y2="545" stroke-dasharray="2,2"/>
    <text x="570" y="545" fill="#ff6b6b">Bulk operations</text>
    <text x="570" y="560" fill="#ff6b6b">Tag statistics</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" fill="#343a40" font-size="24" font-weight="bold">Rating & Tagging System Wireframe</text>
</svg>