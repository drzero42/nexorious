<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#grid)"/>
  
  <!-- Main Container -->
  <rect x="50" y="60" width="1100" height="780" fill="white" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="50" y="60" width="1100" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0 0 1 0"/>
  <text x="80" y="90" fill="#343a40" font-size="20" font-weight="bold">Select the Correct Game</text>
  <text x="80" y="115" fill="#6c757d" font-size="14">Multiple games found for "Baldur's Gate". Choose the one you want to add.</text>
  
  <!-- Back Button -->
  <rect x="950" y="80" width="80" height="30" rx="4" fill="#6c757d"/>
  <text x="990" y="100" text-anchor="middle" fill="white" font-size="12">← Back</text>
  
  <!-- Close Button -->
  <rect x="1050" y="80" width="80" height="30" rx="4" fill="#dc3545"/>
  <text x="1090" y="100" text-anchor="middle" fill="white" font-size="12">× Cancel</text>
  
  <!-- Search Query Display -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" fill="#6c757d" font-size="14">Search query: </text>
    <text x="100" y="0" fill="#343a40" font-size="14" font-weight="500">"Baldur's Gate"</text>
    <text x="220" y="0" fill="#6c757d" font-size="14">• 5 games found</text>
    
    <!-- Refine Search -->
    <rect x="800" y="-15" width="120" height="30" rx="4" fill="#007bff"/>
    <text x="860" y="4" text-anchor="middle" fill="white" font-size="12">Refine Search</text>
  </g>
  
  <!-- Game Candidates Grid -->
  <g transform="translate(80, 200)">
    <!-- Candidate 1 - Highlighted/Selected -->
    <rect x="0" y="0" width="520" height="200" rx="8" fill="#e3f2fd" stroke="#007bff" stroke-width="2"/>
    
    <!-- Cover Art -->
    <rect x="20" y="20" width="120" height="160" rx="4" fill="#e9ecef"/>
    <text x="80" y="105" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
    
    <!-- Game Info -->
    <text x="160" y="40" fill="#343a40" font-size="18" font-weight="bold">Baldur's Gate 3</text>
    <text x="160" y="60" fill="#6c757d" font-size="14">Larian Studios • 2023</text>
    
    <!-- Platforms -->
    <text x="160" y="85" fill="#6c757d" font-size="12">Platforms:</text>
    <rect x="220" y="75" width="30" height="18" rx="2" fill="#007bff"/>
    <text x="235" y="87" text-anchor="middle" fill="white" font-size="10">PC</text>
    <rect x="255" y="75" width="30" height="18" rx="2" fill="#28a745"/>
    <text x="270" y="87" text-anchor="middle" fill="white" font-size="10">PS5</text>
    <rect x="290" y="75" width="30" height="18" rx="2" fill="#ffc107"/>
    <text x="305" y="87" text-anchor="middle" fill="white" font-size="10">Xbox</text>
    
    <!-- Description -->
    <text x="160" y="110" fill="#6c757d" font-size="12">A story-rich, party-based RPG set in the universe of</text>
    <text x="160" y="125" fill="#6c757d" font-size="12">Dungeons &amp; Dragons. Your choices shape a tale of</text>
    <text x="160" y="140" fill="#6c757d" font-size="12">fellowship, betrayal, and the lure of absolute power.</text>
    
    <!-- Metadata -->
    <text x="160" y="165" fill="#6c757d" font-size="12">Genre: RPG, Strategy • Rating: M • Metacritic: 96/100</text>
    
    <!-- Select Button -->
    <rect x="400" y="150" width="100" height="35" rx="4" fill="#28a745"/>
    <text x="450" y="172" text-anchor="middle" fill="white" font-size="14" font-weight="500">Select This</text>
    
    <!-- Selected Indicator -->
    <circle cx="480" cy="30" r="12" fill="#28a745"/>
    <text x="475" y="35" fill="white" font-size="10">✓</text>
    
    <!-- Candidate 2 -->
    <rect x="540" y="0" width="520" height="200" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Cover Art -->
    <rect x="560" y="20" width="120" height="160" rx="4" fill="#e9ecef"/>
    <text x="620" y="105" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
    
    <!-- Game Info -->
    <text x="700" y="40" fill="#343a40" font-size="18" font-weight="bold">Baldur's Gate II: Enhanced Edition</text>
    <text x="700" y="60" fill="#6c757d" font-size="14">Beamdog • 2013</text>
    
    <!-- Platforms -->
    <text x="700" y="85" fill="#6c757d" font-size="12">Platforms:</text>
    <rect x="760" y="75" width="30" height="18" rx="2" fill="#007bff"/>
    <text x="775" y="87" text-anchor="middle" fill="white" font-size="10">PC</text>
    <rect x="795" y="75" width="30" height="18" rx="2" fill="#6c757d"/>
    <text x="810" y="87" text-anchor="middle" fill="white" font-size="10">iOS</text>
    <rect x="830" y="75" width="40" height="18" rx="2" fill="#6c757d"/>
    <text x="850" y="87" text-anchor="middle" fill="white" font-size="10">Android</text>
    
    <!-- Description -->
    <text x="700" y="110" fill="#6c757d" font-size="12">Enhanced edition of the classic RPG. Kidnapped,</text>
    <text x="700" y="125" fill="#6c757d" font-size="12">imprisoned, and tortured, you must escape and</text>
    <text x="700" y="140" fill="#6c757d" font-size="12">uncover the truth behind your imprisonment.</text>
    
    <!-- Metadata -->
    <text x="700" y="165" fill="#6c757d" font-size="12">Genre: RPG • Rating: T • Metacritic: 85/100</text>
    
    <!-- Select Button -->
    <rect x="940" y="150" width="100" height="35" rx="4" fill="#007bff"/>
    <text x="990" y="172" text-anchor="middle" fill="white" font-size="14" font-weight="500">Select This</text>
    
    <!-- Candidate 3 -->
    <rect x="0" y="220" width="520" height="200" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Cover Art -->
    <rect x="20" y="240" width="120" height="160" rx="4" fill="#e9ecef"/>
    <text x="80" y="325" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
    
    <!-- Game Info -->
    <text x="160" y="260" fill="#343a40" font-size="18" font-weight="bold">Baldur's Gate: Enhanced Edition</text>
    <text x="160" y="280" fill="#6c757d" font-size="14">Beamdog • 2012</text>
    
    <!-- Platforms -->
    <text x="160" y="305" fill="#6c757d" font-size="12">Platforms:</text>
    <rect x="220" y="295" width="30" height="18" rx="2" fill="#007bff"/>
    <text x="235" y="307" text-anchor="middle" fill="white" font-size="10">PC</text>
    <rect x="255" y="295" width="30" height="18" rx="2" fill="#6c757d"/>
    <text x="270" y="307" text-anchor="middle" fill="white" font-size="10">iOS</text>
    <rect x="290" y="295" width="40" height="18" rx="2" fill="#6c757d"/>
    <text x="310" y="307" text-anchor="middle" fill="white" font-size="10">Android</text>
    
    <!-- Description -->
    <text x="160" y="330" fill="#6c757d" font-size="12">Enhanced edition of the original Baldur's Gate.</text>
    <text x="160" y="345" fill="#6c757d" font-size="12">Forced to leave your homeland, you must find</text>
    <text x="160" y="360" fill="#6c757d" font-size="12">the source of the iron crisis that threatens all.</text>
    
    <!-- Metadata -->
    <text x="160" y="385" fill="#6c757d" font-size="12">Genre: RPG • Rating: T • Metacritic: 78/100</text>
    
    <!-- Select Button -->
    <rect x="400" y="370" width="100" height="35" rx="4" fill="#007bff"/>
    <text x="450" y="392" text-anchor="middle" fill="white" font-size="14" font-weight="500">Select This</text>
    
    <!-- Candidate 4 -->
    <rect x="540" y="220" width="520" height="200" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Cover Art -->
    <rect x="560" y="240" width="120" height="160" rx="4" fill="#e9ecef"/>
    <text x="620" y="325" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
    
    <!-- Game Info -->
    <text x="700" y="260" fill="#343a40" font-size="18" font-weight="bold">Baldur's Gate: Dark Alliance</text>
    <text x="700" y="280" fill="#6c757d" font-size="14">Snowblind Studios • 2001</text>
    
    <!-- Platforms -->
    <text x="700" y="305" fill="#6c757d" font-size="12">Platforms:</text>
    <rect x="760" y="295" width="30" height="18" rx="2" fill="#007bff"/>
    <text x="775" y="307" text-anchor="middle" fill="white" font-size="10">PC</text>
    <rect x="795" y="295" width="30" height="18" rx="2" fill="#28a745"/>
    <text x="810" y="307" text-anchor="middle" fill="white" font-size="10">PS2</text>
    <rect x="830" y="295" width="30" height="18" rx="2" fill="#ffc107"/>
    <text x="845" y="307" text-anchor="middle" fill="white" font-size="10">Xbox</text>
    
    <!-- Description -->
    <text x="700" y="330" fill="#6c757d" font-size="12">Action RPG spin-off of the classic series.</text>
    <text x="700" y="345" fill="#6c757d" font-size="12">Fight through hordes of monsters in this</text>
    <text x="700" y="360" fill="#6c757d" font-size="12">cooperative dungeon crawler.</text>
    
    <!-- Metadata -->
    <text x="700" y="385" fill="#6c757d" font-size="12">Genre: Action RPG • Rating: T • Metacritic: 81/100</text>
    
    <!-- Select Button -->
    <rect x="940" y="370" width="100" height="35" rx="4" fill="#007bff"/>
    <text x="990" y="392" text-anchor="middle" fill="white" font-size="14" font-weight="500">Select This</text>
    
    <!-- Load More Button -->
    <rect x="0" y="440" width="1060" height="40" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="530" y="465" text-anchor="middle" fill="#007bff" font-size="14">Load 1 more result...</text>
  </g>
  
  <!-- Action Buttons -->
  <g transform="translate(80, 720)">
    <!-- Still not found -->
    <text x="0" y="20" fill="#6c757d" font-size="14">Still can't find the right game? </text>
    <text x="210" y="20" fill="#007bff" font-size="14" text-decoration="underline">Add manually</text>
    <text x="300" y="20" fill="#6c757d" font-size="14"> or </text>
    <text x="330" y="20" fill="#007bff" font-size="14" text-decoration="underline">refine your search</text>
    
    <!-- Continue Button -->
    <rect x="800" y="0" width="120" height="40" rx="4" fill="#28a745"/>
    <text x="860" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="500">Continue</text>
    
    <!-- Cancel Button -->
    <rect x="940" y="0" width="100" height="40" rx="4" fill="#6c757d"/>
    <text x="990" y="25" text-anchor="middle" fill="white" font-size="14">Cancel</text>
  </g>
  
  <!-- Comparison Tool -->
  <g id="comparison-tool" opacity="0">
    <rect x="200" y="200" width="800" height="400" rx="8" fill="white" stroke="#dee2e6" stroke-width="2"/>
    <text x="600" y="230" text-anchor="middle" fill="#343a40" font-size="18" font-weight="bold">Compare Games</text>
    
    <!-- Comparison Table -->
    <g transform="translate(220, 250)">
      <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="bold">FEATURE</text>
      <text x="200" y="0" fill="#6c757d" font-size="12" font-weight="bold">BALDUR'S GATE 3</text>
      <text x="400" y="0" fill="#6c757d" font-size="12" font-weight="bold">BALDUR'S GATE II</text>
      
      <text x="0" y="30" fill="#6c757d" font-size="12">Release Year</text>
      <text x="200" y="30" fill="#343a40" font-size="12">2023</text>
      <text x="400" y="30" fill="#343a40" font-size="12">2013</text>
      
      <text x="0" y="50" fill="#6c757d" font-size="12">Developer</text>
      <text x="200" y="50" fill="#343a40" font-size="12">Larian Studios</text>
      <text x="400" y="50" fill="#343a40" font-size="12">Beamdog</text>
      
      <text x="0" y="70" fill="#6c757d" font-size="12">Platforms</text>
      <text x="200" y="70" fill="#343a40" font-size="12">PC, PS5, Xbox</text>
      <text x="400" y="70" fill="#343a40" font-size="12">PC, iOS, Android</text>
      
      <text x="0" y="90" fill="#6c757d" font-size="12">Rating</text>
      <text x="200" y="90" fill="#343a40" font-size="12">96/100</text>
      <text x="400" y="90" fill="#343a40" font-size="12">85/100</text>
    </g>
    
    <!-- Close Comparison -->
    <rect x="950" y="210" width="30" height="30" rx="4" fill="#dc3545"/>
    <text x="965" y="228" text-anchor="middle" fill="white" font-size="16">×</text>
  </g>
  
  <!-- Filter Panel -->
  <g transform="translate(1100, 200)">
    <rect x="0" y="0" width="200" height="300" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    
    <text x="15" y="25" fill="#6c757d" font-size="14" font-weight="500">Filter Results</text>
    
    <!-- Release Year Filter -->
    <text x="15" y="50" fill="#6c757d" font-size="12">Release Year</text>
    <rect x="15" y="55" width="170" height="25" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="25" y="72" fill="#6c757d" font-size="12">2020-2023</text>
    
    <!-- Platform Filter -->
    <text x="15" y="100" fill="#6c757d" font-size="12">Platform</text>
    <rect x="15" y="110" width="16" height="16" rx="2" fill="#007bff"/>
    <text x="23" y="121" fill="white" font-size="10">✓</text>
    <text x="40" y="121" fill="#343a40" font-size="12">PC</text>
    
    <rect x="15" y="130" width="16" height="16" rx="2" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="40" y="141" fill="#343a40" font-size="12">PlayStation</text>
    
    <rect x="15" y="150" width="16" height="16" rx="2" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="40" y="161" fill="#343a40" font-size="12">Xbox</text>
    
    <!-- Rating Filter -->
    <text x="15" y="185" fill="#6c757d" font-size="12">Min Rating</text>
    <rect x="15" y="190" width="170" height="25" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="25" y="207" fill="#6c757d" font-size="12">80/100</text>
    
    <!-- Clear Filters -->
    <rect x="15" y="240" width="170" height="30" rx="4" fill="#dc3545"/>
    <text x="100" y="259" text-anchor="middle" fill="white" font-size="12">Clear Filters</text>
  </g>
  
  <!-- Annotations -->
  <g fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" font-size="12">
    <!-- Selection annotation -->
    <line x1="480" y1="230" x2="480" y2="180" stroke-dasharray="2,2"/>
    <text x="400" y="175" fill="#ff6b6b">Visual selection</text>
    <text x="400" y="190" fill="#ff6b6b">Single choice</text>
    
    <!-- Metadata annotation -->
    <line x1="700" y1="365" x2="760" y2="365" stroke-dasharray="2,2"/>
    <text x="770" y="365" fill="#ff6b6b">Rich metadata</text>
    <text x="770" y="380" fill="#ff6b6b">from IGDB</text>
    
    <!-- Comparison annotation -->
    <line x1="1100" y1="250" x2="1050" y2="250" stroke-dasharray="2,2"/>
    <text x="950" y="245" fill="#ff6b6b">Side-by-side</text>
    <text x="950" y="260" fill="#ff6b6b">comparison</text>
  </g>
  
  <!-- Keyboard Shortcuts -->
  <g transform="translate(50, 850)">
    <text x="0" y="0" fill="#6c757d" font-size="11">↑↓: Navigate • Enter: Select • Space: Compare • C: Continue • Esc: Cancel</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#343a40" font-size="24" font-weight="bold">Game Candidate Selection Wireframe</text>
</svg>