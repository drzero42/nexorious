<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Main container -->
  <rect x="400" y="100" width="400" height="600" rx="8" fill="white" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="400" y="100" width="400" height="80" rx="8" fill="#343a40"/>
  <text x="600" y="135" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Nexorious</text>
  <text x="600" y="155" text-anchor="middle" fill="#adb5bd" font-size="14">Game Collection Manager</text>
  
  <!-- Login Form -->
  <text x="450" y="220" fill="#343a40" font-size="20" font-weight="bold">Sign In</text>
  <text x="450" y="240" fill="#6c757d" font-size="14">Welcome back! Please sign in to your account</text>
  
  <!-- Email field -->
  <text x="450" y="280" fill="#343a40" font-size="14" font-weight="500">Email</text>
  <rect x="450" y="290" width="300" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="460" y="315" fill="#6c757d" font-size="14">Enter your email address</text>
  
  <!-- Password field -->
  <text x="450" y="360" fill="#343a40" font-size="14" font-weight="500">Password</text>
  <rect x="450" y="370" width="300" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="460" y="395" fill="#6c757d" font-size="14">Enter your password</text>
  <circle cx="720" cy="390" r="8" fill="none" stroke="#6c757d" stroke-width="1"/>
  <text x="715" y="395" fill="#6c757d" font-size="12">👁</text>
  
  <!-- Remember me checkbox -->
  <rect x="450" y="430" width="16" height="16" rx="2" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="480" y="442" fill="#6c757d" font-size="14">Remember me</text>
  
  <!-- Forgot password link -->
  <text x="650" y="442" fill="#007bff" font-size="14" text-decoration="underline">Forgot password?</text>
  
  <!-- Sign In button -->
  <rect x="450" y="470" width="300" height="44" rx="4" fill="#007bff" stroke="#007bff" stroke-width="1"/>
  <text x="600" y="497" text-anchor="middle" fill="white" font-size="16" font-weight="500">Sign In</text>
  
  <!-- Divider -->
  <line x1="470" y1="540" x2="730" y2="540" stroke="#dee2e6" stroke-width="1"/>
  <text x="600" y="545" text-anchor="middle" fill="#6c757d" font-size="12" dy="15">or</text>
  
  <!-- Register link -->
  <text x="450" y="580" fill="#6c757d" font-size="14">Don't have an account? </text>
  <text x="598" y="580" fill="#007bff" font-size="14" text-decoration="underline">Create one</text>
  
  <!-- Loading state overlay (hidden by default) -->
  <g id="loading-overlay" opacity="0">
    <rect x="450" y="470" width="300" height="44" rx="4" fill="#6c757d"/>
    <circle cx="580" cy="492" r="8" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4,4">
      <animateTransform attributeName="transform" type="rotate" dur="1s" repeatCount="indefinite" values="0 580 492;360 580 492"/>
    </circle>
    <text x="600" y="497" text-anchor="middle" fill="white" font-size="16" font-weight="500">Signing in...</text>
  </g>
  
  <!-- Annotations -->
  <g fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" font-size="12">
    <!-- Email field annotation -->
    <line x1="760" y1="310" x2="820" y2="310" stroke-dasharray="2,2"/>
    <text x="830" y="310" fill="#ff6b6b">Email validation</text>
    <text x="830" y="325" fill="#ff6b6b">Real-time feedback</text>
    
    <!-- Password field annotation -->
    <line x1="760" y1="390" x2="820" y2="390" stroke-dasharray="2,2"/>
    <text x="830" y="390" fill="#ff6b6b">Show/hide password</text>
    <text x="830" y="405" fill="#ff6b6b">Strength indicator</text>
    
    <!-- Login button annotation -->
    <line x1="760" y1="492" x2="820" y2="492" stroke-dasharray="2,2"/>
    <text x="830" y="492" fill="#ff6b6b">Loading state</text>
    <text x="830" y="507" fill="#ff6b6b">Disabled when invalid</text>
  </g>
  
  <!-- Error state example -->
  <g id="error-state" opacity="0">
    <rect x="450" y="250" width="300" height="32" rx="4" fill="#f8d7da" stroke="#f5c6cb" stroke-width="1"/>
    <text x="460" y="271" fill="#721c24" font-size="14">Invalid email or password</text>
  </g>
  
  <!-- Mobile breakpoint indicator -->
  <text x="50" y="50" fill="#6c757d" font-size="12">Desktop: 1200px</text>
  <text x="50" y="70" fill="#6c757d" font-size="12">Mobile: 375px (responsive)</text>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" fill="#343a40" font-size="24" font-weight="bold">Login Page Wireframe</text>
</svg>