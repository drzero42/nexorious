<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1000" viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="1000" fill="#f8f9fa"/>
  
  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="1000" fill="url(#grid)"/>
  
  <!-- Main Container -->
  <rect x="50" y="50" width="1100" height="900" fill="white" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Header with breadcrumb -->
  <rect x="50" y="50" width="1100" height="60" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0 0 1 0"/>
  <text x="80" y="75" fill="#6c757d" font-size="14">Library › Games › </text>
  <text x="180" y="75" fill="#343a40" font-size="14" font-weight="500">Baldur's Gate 3</text>
  
  <!-- Back Button -->
  <rect x="1000" y="65" width="80" height="30" rx="4" fill="#6c757d" stroke="#6c757d" stroke-width="1"/>
  <text x="1040" y="83" text-anchor="middle" fill="white" font-size="12">← Back</text>
  
  <!-- Main Content Area -->
  <g transform="translate(80, 130)">
    <!-- Left Column - Game Info -->
    <g transform="translate(0, 0)">
      <!-- Cover Art -->
      <rect x="0" y="0" width="200" height="280" rx="8" fill="#e9ecef"/>
      <text x="100" y="145" text-anchor="middle" fill="#6c757d" font-size="16">Cover Art</text>
      
      <!-- Platform Icons -->
      <g transform="translate(0, 300)">
        <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">Available on:</text>
        <rect x="0" y="10" width="40" height="30" rx="4" fill="#007bff"/>
        <text x="20" y="30" text-anchor="middle" fill="white" font-size="12">PC</text>
        <rect x="50" y="10" width="40" height="30" rx="4" fill="#28a745"/>
        <text x="70" y="30" text-anchor="middle" fill="white" font-size="12">PS5</text>
        <rect x="100" y="10" width="40" height="30" rx="4" fill="#ffc107"/>
        <text x="120" y="30" text-anchor="middle" fill="white" font-size="12">Xbox</text>
      </g>
      
      <!-- Owned Platforms -->
      <g transform="translate(0, 370)">
        <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">You own on:</text>
        <rect x="0" y="10" width="60" height="30" rx="4" fill="#007bff"/>
        <text x="30" y="30" text-anchor="middle" fill="white" font-size="12">Steam</text>
        <text x="70" y="30" fill="#6c757d" font-size="12">$59.99</text>
      </g>
      
      <!-- Quick Actions -->
      <g transform="translate(0, 430)">
        <rect x="0" y="0" width="200" height="36" rx="4" fill="#28a745"/>
        <text x="100" y="23" text-anchor="middle" fill="white" font-size="14" font-weight="500">▶ Play Now</text>
        
        <rect x="0" y="46" width="95" height="36" rx="4" fill="#007bff"/>
        <text x="47" y="69" text-anchor="middle" fill="white" font-size="12">✏️ Edit</text>
        
        <rect x="105" y="46" width="95" height="36" rx="4" fill="#dc3545"/>
        <text x="152" y="69" text-anchor="middle" fill="white" font-size="12">🗑️ Remove</text>
      </g>
    </g>
    
    <!-- Right Column - Game Details -->
    <g transform="translate(240, 0)">
      <!-- Title and Basic Info -->
      <text x="0" y="0" fill="#343a40" font-size="28" font-weight="bold">Baldur's Gate 3</text>
      <text x="0" y="25" fill="#6c757d" font-size="16">Larian Studios • 2023</text>
      
      <!-- Status and Rating -->
      <g transform="translate(0, 50)">
        <rect x="0" y="0" width="100" height="30" rx="15" fill="#28a745"/>
        <text x="50" y="20" text-anchor="middle" fill="white" font-size="12" font-weight="500">Completed</text>
        
        <text x="120" y="20" fill="#ffc107" font-size="18">⭐⭐⭐⭐⭐</text>
        <text x="220" y="20" fill="#dc3545" font-size="20">❤️</text>
        <text x="250" y="20" fill="#6c757d" font-size="14">Loved</text>
      </g>
      
      <!-- Progress Stats -->
      <g transform="translate(0, 100)">
        <rect x="0" y="0" width="600" height="80" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
        
        <!-- Hours Played -->
        <text x="20" y="25" fill="#6c757d" font-size="12" font-weight="500">HOURS PLAYED</text>
        <text x="20" y="50" fill="#343a40" font-size="24" font-weight="bold">87</text>
        <text x="20" y="65" fill="#17a2b8" font-size="12">Main: 60h • Extra: 27h</text>
        
        <!-- Completion -->
        <text x="200" y="25" fill="#6c757d" font-size="12" font-weight="500">COMPLETION</text>
        <text x="200" y="50" fill="#343a40" font-size="24" font-weight="bold">100%</text>
        <text x="200" y="65" fill="#28a745" font-size="12">All achievements</text>
        
        
        <!-- Acquired -->
        <text x="480" y="25" fill="#6c757d" font-size="12" font-weight="500">ACQUIRED</text>
        <text x="480" y="50" fill="#343a40" font-size="24" font-weight="bold">Aug</text>
        <text x="480" y="65" fill="#6c757d" font-size="12">2023</text>
      </g>
      
      <!-- Tags -->
      <g transform="translate(0, 200)">
        <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">TAGS</text>
        <rect x="0" y="10" width="40" height="20" rx="10" fill="#007bff"/>
        <text x="20" y="23" text-anchor="middle" fill="white" font-size="10">RPG</text>
        
        <rect x="50" y="10" width="50" height="20" rx="10" fill="#28a745"/>
        <text x="75" y="23" text-anchor="middle" fill="white" font-size="10">Fantasy</text>
        
        <rect x="110" y="10" width="60" height="20" rx="10" fill="#ffc107"/>
        <text x="140" y="23" text-anchor="middle" fill="white" font-size="10">Turn-based</text>
        
        <rect x="180" y="10" width="50" height="20" rx="10" fill="#6f42c1"/>
        <text x="205" y="23" text-anchor="middle" fill="white" font-size="10">Story-rich</text>
        
        <rect x="240" y="10" width="30" height="20" rx="10" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
        <text x="255" y="23" text-anchor="middle" fill="#6c757d" font-size="10">+</text>
      </g>
      
      <!-- Description -->
      <g transform="translate(0, 260)">
        <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">DESCRIPTION</text>
        <text x="0" y="20" fill="#343a40" font-size="14">Baldur's Gate 3 is a story-rich, party-based RPG set in the</text>
        <text x="0" y="35" fill="#343a40" font-size="14">universe of Dungeons &amp; Dragons, where your choices shape</text>
        <text x="0" y="50" fill="#343a40" font-size="14">a tale of fellowship and betrayal, survival and sacrifice, and</text>
        <text x="0" y="65" fill="#343a40" font-size="14">the lure of absolute power.</text>
        <text x="0" y="85" fill="#007bff" font-size="14" text-decoration="underline">Read more...</text>
      </g>
      
      <!-- Game Details -->
      <g transform="translate(0, 370)">
        <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">GAME DETAILS</text>
        
        <!-- Two columns -->
        <g transform="translate(0, 20)">
          <text x="0" y="0" fill="#6c757d" font-size="12">Developer:</text>
          <text x="80" y="0" fill="#343a40" font-size="12">Larian Studios</text>
          
          <text x="0" y="20" fill="#6c757d" font-size="12">Publisher:</text>
          <text x="80" y="20" fill="#343a40" font-size="12">Larian Studios</text>
          
          <text x="0" y="40" fill="#6c757d" font-size="12">Release Date:</text>
          <text x="80" y="40" fill="#343a40" font-size="12">August 3, 2023</text>
          
          <text x="0" y="60" fill="#6c757d" font-size="12">Genre:</text>
          <text x="80" y="60" fill="#343a40" font-size="12">RPG, Strategy</text>
          
          <text x="200" y="0" fill="#6c757d" font-size="12">Playtime:</text>
          <text x="280" y="0" fill="#343a40" font-size="12">60-100 hours</text>
          
          <text x="200" y="20" fill="#6c757d" font-size="12">Difficulty:</text>
          <text x="280" y="20" fill="#343a40" font-size="12">Medium</text>
          
          <text x="200" y="40" fill="#6c757d" font-size="12">Rating:</text>
          <text x="280" y="40" fill="#343a40" font-size="12">M - Mature 17+</text>
          
          <text x="200" y="60" fill="#6c757d" font-size="12">Metacritic:</text>
          <text x="280" y="60" fill="#343a40" font-size="12">96/100</text>
        </g>
      </g>
    </g>
  </g>
  
  <!-- Notes Section -->
  <g transform="translate(80, 630)">
    <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">PERSONAL NOTES</text>
    
    <rect x="0" y="10" width="800" height="120" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="15" y="30" fill="#343a40" font-size="14">Amazing game! The story choices actually matter and the</text>
    <text x="15" y="50" fill="#343a40" font-size="14">character development is incredible. Spent way too much time</text>
    <text x="15" y="70" fill="#343a40" font-size="14">in character creation and talking to every NPC. Definitely</text>
    <text x="15" y="90" fill="#343a40" font-size="14">worth multiple playthroughs.</text>
    
    <rect x="720" y="100" width="60" height="24" rx="4" fill="#007bff"/>
    <text x="750" y="115" text-anchor="middle" fill="white" font-size="12">Edit</text>
  </g>
  
  <!-- Progress Tracking Panel -->
  <g transform="translate(900, 630)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    
    <text x="20" y="25" fill="#6c757d" font-size="12" font-weight="500">UPDATE PROGRESS</text>
    
    <!-- Status Dropdown -->
    <text x="20" y="50" fill="#343a40" font-size="12">Status</text>
    <rect x="20" y="55" width="200" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="30" y="75" fill="#343a40" font-size="12">Completed ▼</text>
    
    <!-- Hours Input -->
    <text x="20" y="105" fill="#343a40" font-size="12">Hours Played</text>
    <rect x="20" y="110" width="90" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="30" y="130" fill="#343a40" font-size="12">87</text>
    
    
    <!-- Save Button -->
    <rect x="20" y="155" width="200" height="30" rx="4" fill="#28a745"/>
    <text x="120" y="175" text-anchor="middle" fill="white" font-size="12">Save Changes</text>
  </g>
  
  <!-- Status Dropdown Options -->
  <g id="status-dropdown" opacity="0">
    <rect x="920" y="685" width="200" height="200" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="930" y="705" fill="#343a40" font-size="12">Not Started</text>
    <text x="930" y="725" fill="#343a40" font-size="12">In Progress</text>
    <rect x="920" y="735" width="200" height="20" fill="#007bff"/>
    <text x="930" y="748" fill="white" font-size="12">Completed</text>
    <text x="930" y="765" fill="#343a40" font-size="12">Mastered</text>
    <text x="930" y="785" fill="#343a40" font-size="12">Dominated</text>
    <text x="930" y="805" fill="#343a40" font-size="12">Shelved</text>
    <text x="930" y="825" fill="#343a40" font-size="12">Dropped</text>
    <text x="930" y="845" fill="#343a40" font-size="12">Replay</text>
  </g>
  
  <!-- Activity History -->
  <g transform="translate(80, 780)">
    <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">ACTIVITY HISTORY</text>
    
    <!-- Activity Items -->
    <g transform="translate(0, 20)">
      <circle cx="10" cy="10" r="4" fill="#28a745"/>
      <text x="25" y="15" fill="#343a40" font-size="12">Marked as completed</text>
      <text x="200" y="15" fill="#6c757d" font-size="12">2 hours ago</text>
      
      <circle cx="10" cy="35" r="4" fill="#ffc107"/>
      <text x="25" y="40" fill="#343a40" font-size="12">Rated 5 stars</text>
      <text x="200" y="40" fill="#6c757d" font-size="12">2 hours ago</text>
      
      <circle cx="10" cy="60" r="4" fill="#007bff"/>
      <text x="25" y="65" fill="#343a40" font-size="12">Updated hours played to 87</text>
      <text x="200" y="65" fill="#6c757d" font-size="12">2 hours ago</text>
      
      <circle cx="10" cy="85" r="4" fill="#17a2b8"/>
      <text x="25" y="90" fill="#343a40" font-size="12">Added to loved games</text>
      <text x="200" y="90" fill="#6c757d" font-size="12">1 day ago</text>
      
      <circle cx="10" cy="110" r="4" fill="#6c757d"/>
      <text x="25" y="115" fill="#343a40" font-size="12">Added to library</text>
      <text x="200" y="115" fill="#6c757d" font-size="12">3 months ago</text>
    </g>
  </g>
  
  <!-- Annotations -->
  <g fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" font-size="12">
    <!-- Cover art annotation -->
    <line x1="280" y1="270" x2="350" y2="270" stroke-dasharray="2,2"/>
    <text x="360" y="270" fill="#ff6b6b">High-res cover art</text>
    <text x="360" y="285" fill="#ff6b6b">Zoom on click</text>
    
    <!-- Progress tracking annotation -->
    <line x1="900" y1="730" x2="850" y2="730" stroke-dasharray="2,2"/>
    <text x="750" y="730" fill="#ff6b6b">Quick updates</text>
    <text x="750" y="745" fill="#ff6b6b">Keyboard shortcuts</text>
    
    <!-- Notes annotation -->
    <line x1="400" y1="640" x2="400" y2="600" stroke-dasharray="2,2"/>
    <text x="320" y="595" fill="#ff6b6b">Rich text editor</text>
    <text x="320" y="610" fill="#ff6b6b">Auto-save</text>
    
    <!-- Activity history annotation -->
    <line x1="80" y1="890" x2="30" y2="890" stroke-dasharray="2,2"/>
    <text x="20" y="905" fill="#ff6b6b">Change log</text>
    <text x="20" y="920" fill="#ff6b6b">Timeline</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" fill="#343a40" font-size="24" font-weight="bold">Game Detail View Wireframe</text>
</svg>