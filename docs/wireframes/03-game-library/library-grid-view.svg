<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#grid)"/>
  
  <!-- Main Container -->
  <rect x="50" y="50" width="1100" height="800" fill="white" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="1100" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0 0 1 0"/>
  <text x="80" y="80" fill="#343a40" font-size="24" font-weight="bold">Game Library</text>
  <text x="80" y="100" fill="#6c757d" font-size="14">Browse your collection with cover art</text>
  
  <!-- Search and Filter Controls -->
  <g transform="translate(80, 150)">
    <!-- Search Bar -->
    <rect x="0" y="0" width="400" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="15" y="25" fill="#6c757d" font-size="14">🔍 Search games...</text>
    
    <!-- Filter Dropdowns -->
    <rect x="420" y="0" width="120" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="435" y="25" fill="#6c757d" font-size="14">Platform ▼</text>
    
    <rect x="560" y="0" width="120" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="575" y="25" fill="#6c757d" font-size="14">Status ▼</text>
    
    <rect x="700" y="0" width="120" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="715" y="25" fill="#6c757d" font-size="14">Genre ▼</text>
    
    <!-- Sort Options -->
    <rect x="840" y="0" width="120" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="855" y="25" fill="#6c757d" font-size="14">Sort by ▼</text>
    
    <!-- View Toggle -->
    <rect x="980" y="0" width="80" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="1005" y="25" fill="#6c757d" font-size="12">📋 List</text>
    
    <rect x="1070" y="0" width="80" height="40" rx="4" fill="#007bff" stroke="#007bff" stroke-width="1"/>
    <text x="1095" y="25" fill="white" font-size="12">⊞ Grid</text>
  </g>
  
  <!-- Results Summary -->
  <text x="80" y="230" fill="#6c757d" font-size="14">Showing 1-12 of 1,247 games</text>
  
  <!-- Grid Size Slider -->
  <g transform="translate(900, 220)">
    <text x="0" y="0" fill="#6c757d" font-size="12">Grid Size:</text>
    <rect x="70" y="-8" width="100" height="4" rx="2" fill="#e9ecef"/>
    <rect x="70" y="-8" width="60" height="4" rx="2" fill="#007bff"/>
    <circle cx="130" cy="-6" r="6" fill="#007bff"/>
    <text x="180" y="0" fill="#6c757d" font-size="12">Large</text>
  </g>
  
  <!-- Games Grid -->
  <g transform="translate(80, 260)">
    <!-- Row 1 -->
    <!-- Game 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      
      <!-- Cover Art -->
      <rect x="10" y="10" width="160" height="200" rx="4" fill="#e9ecef"/>
      <text x="90" y="115" text-anchor="middle" fill="#6c757d" font-size="14">Cover Art</text>
      
      <!-- Status Badge -->
      <rect x="120" y="20" width="40" height="20" rx="10" fill="#28a745"/>
      <text x="140" y="33" text-anchor="middle" fill="white" font-size="10">Done</text>
      
      <!-- Platform Icons -->
      <text x="20" y="190" fill="#6c757d" font-size="12">🖥️ 🎮</text>
      
      <!-- Game Info -->
      <text x="10" y="235" fill="#343a40" font-size="14" font-weight="500">Baldur's Gate 3</text>
      <text x="10" y="250" fill="#6c757d" font-size="12">RPG • 2023</text>
      <text x="10" y="265" fill="#ffc107" font-size="12">⭐⭐⭐⭐⭐</text>
      
      <!-- Loved indicator -->
      <text x="150" y="235" fill="#dc3545" font-size="16">❤️</text>
      
      <!-- Hover overlay -->
      <rect x="0" y="0" width="180" height="280" rx="8" fill="rgba(0,0,0,0.1)" opacity="0"/>
      <rect x="60" y="120" width="60" height="30" rx="4" fill="rgba(0,0,0,0.8)" opacity="0"/>
      <text x="90" y="138" text-anchor="middle" fill="white" font-size="12" opacity="0">87 hours</text>
    </g>
    
    <!-- Game 2 -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      
      <!-- Cover Art -->
      <rect x="10" y="10" width="160" height="200" rx="4" fill="#e9ecef"/>
      <text x="90" y="115" text-anchor="middle" fill="#6c757d" font-size="14">Cover Art</text>
      
      <!-- Status Badge -->
      <rect x="120" y="20" width="40" height="20" rx="10" fill="#007bff"/>
      <text x="140" y="33" text-anchor="middle" fill="white" font-size="10">Play</text>
      
      <!-- Platform Icons -->
      <text x="20" y="190" fill="#6c757d" font-size="12">🎮</text>
      
      <!-- Game Info -->
      <text x="10" y="235" fill="#343a40" font-size="14" font-weight="500">Cyberpunk 2077</text>
      <text x="10" y="250" fill="#6c757d" font-size="12">Action RPG • 2020</text>
      <text x="10" y="265" fill="#ffc107" font-size="12">⭐⭐⭐⭐☆</text>
      
      <!-- Progress Bar -->
      <rect x="10" y="220" width="160" height="4" rx="2" fill="#e9ecef"/>
      <rect x="10" y="220" width="96" height="4" rx="2" fill="#007bff"/>
    </g>
    
    <!-- Game 3 -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      
      <!-- Cover Art -->
      <rect x="10" y="10" width="160" height="200" rx="4" fill="#e9ecef"/>
      <text x="90" y="115" text-anchor="middle" fill="#6c757d" font-size="14">Cover Art</text>
      
      <!-- Status Badge -->
      <rect x="120" y="20" width="40" height="20" rx="10" fill="#ffc107"/>
      <text x="140" y="33" text-anchor="middle" fill="white" font-size="10">Hold</text>
      
      <!-- Platform Icons -->
      <text x="20" y="190" fill="#6c757d" font-size="12">🎮</text>
      
      <!-- Game Info -->
      <text x="10" y="235" fill="#343a40" font-size="14" font-weight="500">The Witcher 3</text>
      <text x="10" y="250" fill="#6c757d" font-size="12">RPG • 2015</text>
      <text x="10" y="265" fill="#ffc107" font-size="12">⭐⭐⭐⭐⭐</text>
      
      <!-- Loved indicator -->
      <text x="150" y="235" fill="#dc3545" font-size="16">❤️</text>
    </g>
    
    <!-- Game 4 -->
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      
      <!-- Cover Art -->
      <rect x="10" y="10" width="160" height="200" rx="4" fill="#e9ecef"/>
      <text x="90" y="115" text-anchor="middle" fill="#6c757d" font-size="14">Cover Art</text>
      
      <!-- Status Badge -->
      <rect x="120" y="20" width="40" height="20" rx="10" fill="#6c757d"/>
      <text x="140" y="33" text-anchor="middle" fill="white" font-size="10">New</text>
      
      <!-- Platform Icons -->
      <text x="20" y="190" fill="#6c757d" font-size="12">🖥️</text>
      
      <!-- Game Info -->
      <text x="10" y="235" fill="#343a40" font-size="14" font-weight="500">Hollow Knight</text>
      <text x="10" y="250" fill="#6c757d" font-size="12">Metroidvania • 2017</text>
      <text x="10" y="265" fill="#e9ecef" font-size="12">☆☆☆☆☆</text>
      
      <!-- Tags -->
      <rect x="10" y="220" width="30" height="16" rx="8" fill="#17a2b8"/>
      <text x="25" y="230" text-anchor="middle" fill="white" font-size="10">Indie</text>
      <rect x="45" y="220" width="40" height="16" rx="8" fill="#6f42c1"/>
      <text x="65" y="230" text-anchor="middle" fill="white" font-size="10">Difficult</text>
    </g>
    
    <!-- Game 5 -->
    <g transform="translate(800, 0)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      
      <!-- Cover Art -->
      <rect x="10" y="10" width="160" height="200" rx="4" fill="#e9ecef"/>
      <text x="90" y="115" text-anchor="middle" fill="#6c757d" font-size="14">Cover Art</text>
      
      <!-- Status Badge -->
      <rect x="120" y="20" width="40" height="20" rx="10" fill="#17a2b8"/>
      <text x="140" y="33" text-anchor="middle" fill="white" font-size="10">100%</text>
      
      <!-- Platform Icons -->
      <text x="20" y="190" fill="#6c757d" font-size="12">🎮 🖥️</text>
      
      <!-- Game Info -->
      <text x="10" y="235" fill="#343a40" font-size="14" font-weight="500">Elden Ring</text>
      <text x="10" y="250" fill="#6c757d" font-size="12">Action RPG • 2022</text>
      <text x="10" y="265" fill="#ffc107" font-size="12">⭐⭐⭐⭐⭐</text>
      
      <!-- Loved indicator -->
      <text x="150" y="235" fill="#dc3545" font-size="16">❤️</text>
    </g>
    
    <!-- Row 2 -->
    <!-- Game 6 -->
    <g transform="translate(0, 300)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      
      <!-- Cover Art -->
      <rect x="10" y="10" width="160" height="200" rx="4" fill="#e9ecef"/>
      <text x="90" y="115" text-anchor="middle" fill="#6c757d" font-size="14">Cover Art</text>
      
      <!-- Status Badge -->
      <rect x="120" y="20" width="40" height="20" rx="10" fill="#dc3545"/>
      <text x="140" y="33" text-anchor="middle" fill="white" font-size="10">Drop</text>
      
      <!-- Platform Icons -->
      <text x="20" y="190" fill="#6c757d" font-size="12">🎮</text>
      
      <!-- Game Info -->
      <text x="10" y="235" fill="#343a40" font-size="14" font-weight="500">Halo Infinite</text>
      <text x="10" y="250" fill="#6c757d" font-size="12">FPS • 2021</text>
      <text x="10" y="265" fill="#ffc107" font-size="12">⭐⭐☆☆☆</text>
    </g>
    
    <!-- Game 7 -->
    <g transform="translate(200, 300)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      
      <!-- Cover Art -->
      <rect x="10" y="10" width="160" height="200" rx="4" fill="#e9ecef"/>
      <text x="90" y="115" text-anchor="middle" fill="#6c757d" font-size="14">Cover Art</text>
      
      <!-- Status Badge -->
      <rect x="120" y="20" width="40" height="20" rx="10" fill="#fd7e14"/>
      <text x="140" y="33" text-anchor="middle" fill="white" font-size="10">Replay</text>
      
      <!-- Platform Icons -->
      <text x="20" y="190" fill="#6c757d" font-size="12">🖥️</text>
      
      <!-- Game Info -->
      <text x="10" y="235" fill="#343a40" font-size="14" font-weight="500">Dark Souls III</text>
      <text x="10" y="250" fill="#6c757d" font-size="12">Action RPG • 2016</text>
      <text x="10" y="265" fill="#ffc107" font-size="12">⭐⭐⭐⭐⭐</text>
      
      <!-- Loved indicator -->
      <text x="150" y="235" fill="#dc3545" font-size="16">❤️</text>
    </g>
    
    <!-- Add more games placeholders -->
    <g transform="translate(400, 300)">
      <rect x="0" y="0" width="180" height="280" rx="8" fill="white" stroke="#dee2e6" stroke-width="1" stroke-dasharray="5,5"/>
      <text x="90" y="145" text-anchor="middle" fill="#6c757d" font-size="14">More games...</text>
    </g>
  </g>
  
  <!-- Pagination -->
  <g transform="translate(80, 750)">
    <!-- Items per page -->
    <text x="0" y="25" fill="#6c757d" font-size="14">Show </text>
    <rect x="50" y="10" width="60" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="80" y="30" text-anchor="middle" fill="#343a40" font-size="14">12 ▼</text>
    <text x="120" y="25" fill="#6c757d" font-size="14"> per page</text>
    
    <!-- Page Navigation -->
    <rect x="800" y="10" width="40" height="30" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
    <text x="820" y="30" text-anchor="middle" fill="#6c757d" font-size="14">‹</text>
    
    <rect x="850" y="10" width="40" height="30" rx="4" fill="#007bff" stroke="#007bff" stroke-width="1"/>
    <text x="870" y="30" text-anchor="middle" fill="white" font-size="14">1</text>
    
    <rect x="900" y="10" width="40" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="920" y="30" text-anchor="middle" fill="#6c757d" font-size="14">2</text>
    
    <rect x="950" y="10" width="40" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="970" y="30" text-anchor="middle" fill="#6c757d" font-size="14">3</text>
    
    <text x="1000" y="30" fill="#6c757d" font-size="14">...</text>
    
    <rect x="1020" y="10" width="40" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="1040" y="30" text-anchor="middle" fill="#6c757d" font-size="14">104</text>
    
    <rect x="1070" y="10" width="40" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="1090" y="30" text-anchor="middle" fill="#6c757d" font-size="14">›</text>
  </g>
  
  <!-- Quick Action Menu (Right-click context) -->
  <g id="context-menu" opacity="0">
    <rect x="300" y="400" width="140" height="120" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="315" y="420" fill="#343a40" font-size="12">View Details</text>
    <text x="315" y="440" fill="#343a40" font-size="12">Edit Game</text>
    <text x="315" y="460" fill="#343a40" font-size="12">Mark as Completed</text>
    <text x="315" y="480" fill="#343a40" font-size="12">Add to Wishlist</text>
    <text x="315" y="500" fill="#dc3545" font-size="12">Remove</text>
  </g>
  
  <!-- Keyboard Shortcuts Overlay -->
  <g id="shortcuts" opacity="0">
    <rect x="50" y="300" width="200" height="200" rx="8" fill="rgba(0,0,0,0.9)"/>
    <text x="150" y="320" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Keyboard Shortcuts</text>
    <text x="70" y="345" fill="#adb5bd" font-size="12">Arrow Keys - Navigate</text>
    <text x="70" y="365" fill="#adb5bd" font-size="12">Enter - Open Details</text>
    <text x="70" y="385" fill="#adb5bd" font-size="12">Space - Quick Edit</text>
    <text x="70" y="405" fill="#adb5bd" font-size="12">C - Mark Completed</text>
    <text x="70" y="425" fill="#adb5bd" font-size="12">L - Toggle Loved</text>
    <text x="70" y="445" fill="#adb5bd" font-size="12">Del - Remove</text>
    <text x="70" y="465" fill="#adb5bd" font-size="12">/ - Search</text>
  </g>
  
  <!-- Annotations -->
  <g fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" font-size="12">
    <!-- Grid size annotation -->
    <line x1="1000" y1="220" x2="1000" y2="180" stroke-dasharray="2,2"/>
    <text x="920" y="175" fill="#ff6b6b">Adjustable grid size</text>
    <text x="920" y="190" fill="#ff6b6b">Responsive layout</text>
    
    <!-- Status badges annotation -->
    <line x1="140" y1="280" x2="200" y2="280" stroke-dasharray="2,2"/>
    <text x="210" y="280" fill="#ff6b6b">Status indicators</text>
    <text x="210" y="295" fill="#ff6b6b">Color-coded</text>
    
    <!-- Hover states annotation -->
    <line x1="90" y1="260" x2="90" y2="200" stroke-dasharray="2,2"/>
    <text x="10" y="195" fill="#ff6b6b">Hover reveals</text>
    <text x="10" y="210" fill="#ff6b6b">play time</text>
    
    <!-- Tags annotation -->
    <line x1="680" y1="480" x2="740" y2="480" stroke-dasharray="2,2"/>
    <text x="750" y="480" fill="#ff6b6b">User tags</text>
    <text x="750" y="495" fill="#ff6b6b">Filterable</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" fill="#343a40" font-size="24" font-weight="bold">Game Library - Grid View Wireframe</text>
</svg>