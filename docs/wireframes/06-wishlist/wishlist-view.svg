<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#grid)"/>
  
  <!-- Main Container -->
  <rect x="50" y="50" width="1100" height="800" fill="white" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="1100" height="80" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0 0 1 0"/>
  <text x="80" y="80" fill="#343a40" font-size="24" font-weight="bold">Wishlist</text>
  <text x="80" y="105" fill="#6c757d" font-size="14">Games you want to purchase - track prices and availability</text>
  
  <!-- Wishlist Stats -->
  <g transform="translate(700, 70)">
    <text x="0" y="0" fill="#6c757d" font-size="12">Total items: </text>
    <text x="75" y="0" fill="#343a40" font-size="12" font-weight="bold">23</text>
    <text x="100" y="0" fill="#6c757d" font-size="12">• Estimated cost: </text>
    <text x="200" y="0" fill="#343a40" font-size="12" font-weight="bold">$847.75</text>
  </g>
  
  <!-- Search and Filter Controls -->
  <g transform="translate(80, 150)">
    <!-- Search Bar -->
    <rect x="0" y="0" width="400" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="15" y="25" fill="#6c757d" font-size="14">🔍 Search wishlist...</text>
    
    <!-- Sort Options -->
    <rect x="420" y="0" width="150" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="435" y="25" fill="#6c757d" font-size="14">Sort by: Added Date ▼</text>
    
    <!-- Filter by Platform -->
    <rect x="590" y="0" width="120" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="605" y="25" fill="#6c757d" font-size="14">Platform ▼</text>
    
    <!-- Filter by Price -->
    <rect x="730" y="0" width="120" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="745" y="25" fill="#6c757d" font-size="14">Price Range ▼</text>
    
    <!-- View Toggle -->
    <rect x="870" y="0" width="80" height="40" rx="4" fill="#007bff" stroke="#007bff" stroke-width="1"/>
    <text x="895" y="25" fill="white" font-size="12">📋 List</text>
    
    <rect x="960" y="0" width="80" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="985" y="25" fill="#6c757d" font-size="12">⊞ Grid</text>
  </g>
  
  <!-- Results Summary -->
  <text x="80" y="230" fill="#6c757d" font-size="14">Showing 1-10 of 23 games</text>
  
  <!-- Wishlist Items -->
  <g transform="translate(80, 250)">
    <!-- Item 1 -->
    <rect x="0" y="0" width="1040" height="100" rx="4" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Cover Art -->
    <rect x="20" y="20" width="60" height="60" rx="4" fill="#e9ecef"/>
    <text x="50" y="53" text-anchor="middle" fill="#6c757d" font-size="10">IMG</text>
    
    <!-- Game Info -->
    <text x="100" y="35" fill="#343a40" font-size="16" font-weight="bold">Elden Ring</text>
    <text x="100" y="52" fill="#6c757d" font-size="12">FromSoftware • 2022</text>
    <text x="100" y="68" fill="#6c757d" font-size="12">Action RPG • PC, PlayStation 5, Xbox Series X/S</text>
    
    <!-- Priority Badge -->
    <rect x="300" y="25" width="50" height="20" rx="10" fill="#dc3545"/>
    <text x="325" y="37" text-anchor="middle" fill="white" font-size="10">High</text>
    
    <!-- Added Date -->
    <text x="370" y="40" fill="#6c757d" font-size="12">Added 2 weeks ago</text>
    
    <!-- Price Comparison -->
    <g transform="translate(500, 20)">
      <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">Price Comparison</text>
      
      <!-- Steam -->
      <rect x="0" y="10" width="80" height="25" rx="4" fill="#171a21"/>
      <text x="10" y="27" fill="white" font-size="11">Steam</text>
      <text x="50" y="27" fill="white" font-size="11">$59.99</text>
      
      <!-- Epic -->
      <rect x="90" y="10" width="80" height="25" rx="4" fill="#2a2a2a"/>
      <text x="100" y="27" fill="white" font-size="11">Epic</text>
      <text x="130" y="27" fill="white" font-size="11">$49.99</text>
      
      <!-- GOG -->
      <rect x="180" y="10" width="80" height="25" rx="4" fill="#86328a"/>
      <text x="190" y="27" fill="white" font-size="11">GOG</text>
      <text x="220" y="27" fill="white" font-size="11">$54.99</text>
      
      <!-- Price Alert -->
      <rect x="0" y="45" width="260" height="18" rx="9" fill="#d4edda" stroke="#c3e6cb" stroke-width="1"/>
      <text x="10" y="56" fill="#155724" font-size="11">🔔 Price dropped by $10 on Epic</text>
    </g>
    
    <!-- External Links -->
    <g transform="translate(780, 25)">
      <rect x="0" y="0" width="100" height="25" rx="4" fill="#007bff"/>
      <text x="50" y="17" text-anchor="middle" fill="white" font-size="11">IsThereAnyDeal</text>
      
      <rect x="0" y="35" width="100" height="25" rx="4" fill="#28a745"/>
      <text x="50" y="52" text-anchor="middle" fill="white" font-size="11">PSPrices</text>
    </g>
    
    <!-- Actions -->
    <g transform="translate(900, 25)">
      <rect x="0" y="0" width="80" height="25" rx="4" fill="#28a745"/>
      <text x="40" y="17" text-anchor="middle" fill="white" font-size="11">Buy Now</text>
      
      <rect x="0" y="35" width="80" height="25" rx="4" fill="#ffc107"/>
      <text x="40" y="52" text-anchor="middle" fill="white" font-size="11">Move to Owned</text>
    </g>
    
    <!-- Remove Button -->
    <rect x="990" y="25" width="30" height="25" rx="4" fill="#dc3545"/>
    <text x="1005" y="40" text-anchor="middle" fill="white" font-size="12">🗑</text>
    
    <!-- Item 2 -->
    <rect x="0" y="120" width="1040" height="100" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Cover Art -->
    <rect x="20" y="140" width="60" height="60" rx="4" fill="#e9ecef"/>
    <text x="50" y="173" text-anchor="middle" fill="#6c757d" font-size="10">IMG</text>
    
    <!-- Game Info -->
    <text x="100" y="155" fill="#343a40" font-size="16" font-weight="bold">Spider-Man 2</text>
    <text x="100" y="172" fill="#6c757d" font-size="12">Insomniac Games • 2023</text>
    <text x="100" y="188" fill="#6c757d" font-size="12">Action Adventure • PlayStation 5 Exclusive</text>
    
    <!-- Priority Badge -->
    <rect x="300" y="145" width="50" height="20" rx="10" fill="#ffc107"/>
    <text x="325" y="157" text-anchor="middle" fill="white" font-size="10">Medium</text>
    
    <!-- Added Date -->
    <text x="370" y="160" fill="#6c757d" font-size="12">Added 1 month ago</text>
    
    <!-- Price Comparison -->
    <g transform="translate(500, 140)">
      <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">Price Comparison</text>
      
      <!-- PlayStation Store -->
      <rect x="0" y="10" width="120" height="25" rx="4" fill="#003791"/>
      <text x="10" y="27" fill="white" font-size="11">PlayStation Store</text>
      <text x="90" y="27" fill="white" font-size="11">$69.99</text>
      
      <!-- Currently on sale -->
      <rect x="0" y="45" width="120" height="18" rx="9" fill="#dc3545"/>
      <text x="10" y="56" fill="white" font-size="11">🔥 20% OFF - $55.99</text>
    </g>
    
    <!-- External Links -->
    <g transform="translate(780, 145)">
      <rect x="0" y="0" width="100" height="25" rx="4" fill="#007bff"/>
      <text x="50" y="17" text-anchor="middle" fill="white" font-size="11">IsThereAnyDeal</text>
      
      <rect x="0" y="35" width="100" height="25" rx="4" fill="#28a745"/>
      <text x="50" y="52" text-anchor="middle" fill="white" font-size="11">PSPrices</text>
    </g>
    
    <!-- Actions -->
    <g transform="translate(900, 145)">
      <rect x="0" y="0" width="80" height="25" rx="4" fill="#28a745"/>
      <text x="40" y="17" text-anchor="middle" fill="white" font-size="11">Buy Now</text>
      
      <rect x="0" y="35" width="80" height="25" rx="4" fill="#ffc107"/>
      <text x="40" y="52" text-anchor="middle" fill="white" font-size="11">Move to Owned</text>
    </g>
    
    <!-- Remove Button -->
    <rect x="990" y="145" width="30" height="25" rx="4" fill="#dc3545"/>
    <text x="1005" y="160" text-anchor="middle" fill="white" font-size="12">🗑</text>
    
    <!-- Item 3 -->
    <rect x="0" y="240" width="1040" height="100" rx="4" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Cover Art -->
    <rect x="20" y="260" width="60" height="60" rx="4" fill="#e9ecef"/>
    <text x="50" y="293" text-anchor="middle" fill="#6c757d" font-size="10">IMG</text>
    
    <!-- Game Info -->
    <text x="100" y="275" fill="#343a40" font-size="16" font-weight="bold">Starfield</text>
    <text x="100" y="292" fill="#6c757d" font-size="12">Bethesda Game Studios • 2023</text>
    <text x="100" y="308" fill="#6c757d" font-size="12">RPG • PC, Xbox Series X/S</text>
    
    <!-- Priority Badge -->
    <rect x="300" y="265" width="50" height="20" rx="10" fill="#6c757d"/>
    <text x="325" y="277" text-anchor="middle" fill="white" font-size="10">Low</text>
    
    <!-- Added Date -->
    <text x="370" y="280" fill="#6c757d" font-size="12">Added 3 months ago</text>
    
    <!-- Price Comparison -->
    <g transform="translate(500, 260)">
      <text x="0" y="0" fill="#6c757d" font-size="12" font-weight="500">Price Comparison</text>
      
      <!-- Steam -->
      <rect x="0" y="10" width="80" height="25" rx="4" fill="#171a21"/>
      <text x="10" y="27" fill="white" font-size="11">Steam</text>
      <text x="50" y="27" fill="white" font-size="11">$69.99</text>
      
      <!-- Game Pass -->
      <rect x="90" y="10" width="80" height="25" rx="4" fill="#107c10"/>
      <text x="100" y="27" fill="white" font-size="11">Game Pass</text>
      <text x="160" y="27" fill="white" font-size="11">Free</text>
      
      <!-- Available on Game Pass -->
      <rect x="0" y="45" width="170" height="18" rx="9" fill="#d1ecf1" stroke="#bee5eb" stroke-width="1"/>
      <text x="10" y="56" fill="#0c5460" font-size="11">📺 Available on Game Pass</text>
    </g>
    
    <!-- External Links -->
    <g transform="translate(780, 265)">
      <rect x="0" y="0" width="100" height="25" rx="4" fill="#007bff"/>
      <text x="50" y="17" text-anchor="middle" fill="white" font-size="11">IsThereAnyDeal</text>
      
      <rect x="0" y="35" width="100" height="25" rx="4" fill="#28a745"/>
      <text x="50" y="52" text-anchor="middle" fill="white" font-size="11">PSPrices</text>
    </g>
    
    <!-- Actions -->
    <g transform="translate(900, 265)">
      <rect x="0" y="0" width="80" height="25" rx="4" fill="#28a745"/>
      <text x="40" y="17" text-anchor="middle" fill="white" font-size="11">Buy Now</text>
      
      <rect x="0" y="35" width="80" height="25" rx="4" fill="#ffc107"/>
      <text x="40" y="52" text-anchor="middle" fill="white" font-size="11">Move to Owned</text>
    </g>
    
    <!-- Remove Button -->
    <rect x="990" y="265" width="30" height="25" rx="4" fill="#dc3545"/>
    <text x="1005" y="280" text-anchor="middle" fill="white" font-size="12">🗑</text>
    
    <!-- Load More -->
    <rect x="0" y="360" width="1040" height="40" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="520" y="385" text-anchor="middle" fill="#007bff" font-size="14">Load more games...</text>
  </g>
  
  <!-- Bulk Actions -->
  <g transform="translate(80, 670)">
    <rect x="0" y="0" width="20" height="20" rx="2" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="30" y="15" fill="#6c757d" font-size="14">Select all</text>
    
    <rect x="120" y="-5" width="120" height="30" rx="4" fill="#007bff"/>
    <text x="180" y="15" text-anchor="middle" fill="white" font-size="12">Bulk Actions</text>
    
    <rect x="260" y="-5" width="120" height="30" rx="4" fill="#28a745"/>
    <text x="320" y="15" text-anchor="middle" fill="white" font-size="12">Move to Owned</text>
    
    <rect x="400" y="-5" width="120" height="30" rx="4" fill="#dc3545"/>
    <text x="460" y="15" text-anchor="middle" fill="white" font-size="12">Remove Selected</text>
  </g>
  
  <!-- Pagination -->
  <g transform="translate(80, 720)">
    <!-- Items per page -->
    <text x="0" y="25" fill="#6c757d" font-size="14">Show </text>
    <rect x="50" y="10" width="60" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="80" y="30" text-anchor="middle" fill="#343a40" font-size="14">10 ▼</text>
    <text x="120" y="25" fill="#6c757d" font-size="14"> per page</text>
    
    <!-- Page Navigation -->
    <rect x="800" y="10" width="40" height="30" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
    <text x="820" y="30" text-anchor="middle" fill="#6c757d" font-size="14">‹</text>
    
    <rect x="850" y="10" width="40" height="30" rx="4" fill="#007bff" stroke="#007bff" stroke-width="1"/>
    <text x="870" y="30" text-anchor="middle" fill="white" font-size="14">1</text>
    
    <rect x="900" y="10" width="40" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="920" y="30" text-anchor="middle" fill="#6c757d" font-size="14">2</text>
    
    <rect x="950" y="10" width="40" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="970" y="30" text-anchor="middle" fill="#6c757d" font-size="14">3</text>
    
    <rect x="1000" y="10" width="40" height="30" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="1020" y="30" text-anchor="middle" fill="#6c757d" font-size="14">›</text>
  </g>
  
  <!-- Price Alert Settings -->
  <g transform="translate(80, 770)">
    <rect x="0" y="0" width="20" height="20" rx="2" fill="#007bff"/>
    <text x="7" y="14" fill="white" font-size="12">✓</text>
    <text x="30" y="15" fill="#6c757d" font-size="14">Enable price alerts via email</text>
    
    <rect x="220" y="-5" width="120" height="30" rx="4" fill="#17a2b8"/>
    <text x="280" y="15" text-anchor="middle" fill="white" font-size="12">Alert Settings</text>
    
    <rect x="360" y="-5" width="120" height="30" rx="4" fill="#6c757d"/>
    <text x="420" y="15" text-anchor="middle" fill="white" font-size="12">Export List</text>
  </g>
  
  <!-- Empty State -->
  <g id="empty-state" opacity="0">
    <rect x="80" y="250" width="1040" height="400" rx="4" fill="#f8f9fa"/>
    <text x="600" y="420" text-anchor="middle" fill="#6c757d" font-size="18">Your wishlist is empty</text>
    <text x="600" y="445" text-anchor="middle" fill="#6c757d" font-size="14">Add games you want to buy to track prices and availability</text>
    <rect x="520" y="460" width="160" height="40" rx="4" fill="#007bff"/>
    <text x="600" y="485" text-anchor="middle" fill="white" font-size="14">Browse Games</text>
  </g>
  
  <!-- Add to Wishlist Modal -->
  <g id="add-modal" opacity="0">
    <rect x="0" y="0" width="1200" height="900" fill="rgba(0,0,0,0.5)"/>
    <rect x="400" y="300" width="400" height="300" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <text x="600" y="330" text-anchor="middle" fill="#343a40" font-size="18" font-weight="bold">Add to Wishlist</text>
    
    <!-- Game Search -->
    <rect x="430" y="350" width="340" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="440" y="372" fill="#6c757d" font-size="14">Search for a game...</text>
    
    <!-- Priority Selection -->
    <text x="430" y="405" fill="#6c757d" font-size="12" font-weight="500">PRIORITY</text>
    <rect x="430" y="415" width="340" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="440" y="437" fill="#343a40" font-size="14">High ▼</text>
    
    <!-- Price Alert Threshold -->
    <text x="430" y="470" fill="#6c757d" font-size="12" font-weight="500">PRICE ALERT THRESHOLD</text>
    <rect x="430" y="480" width="340" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
    <text x="440" y="502" fill="#343a40" font-size="14">$40.00</text>
    
    <!-- Modal Buttons -->
    <rect x="580" y="540" width="80" height="30" rx="4" fill="#28a745"/>
    <text x="620" y="559" text-anchor="middle" fill="white" font-size="12">Add</text>
    
    <rect x="680" y="540" width="80" height="30" rx="4" fill="#6c757d"/>
    <text x="720" y="559" text-anchor="middle" fill="white" font-size="12">Cancel</text>
  </g>
  
  <!-- Annotations -->
  <g fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" font-size="12">
    <!-- Price comparison annotation -->
    <line x1="650" y1="290" x2="710" y2="290" stroke-dasharray="2,2"/>
    <text x="720" y="290" fill="#ff6b6b">Live price data</text>
    <text x="720" y="305" fill="#ff6b6b">External links</text>
    
    <!-- Priority system annotation -->
    <line x1="325" y1="305" x2="380" y2="305" stroke-dasharray="2,2"/>
    <text x="390" y="305" fill="#ff6b6b">Priority levels</text>
    <text x="390" y="320" fill="#ff6b6b">Color-coded</text>
    
    <!-- Bulk actions annotation -->
    <line x1="180" y1="665" x2="180" y2="630" stroke-dasharray="2,2"/>
    <text x="100" y="625" fill="#ff6b6b">Multi-select</text>
    <text x="100" y="640" fill="#ff6b6b">operations</text>
    
    <!-- Price alerts annotation -->
    <line x1="280" y1="765" x2="280" y2="730" stroke-dasharray="2,2"/>
    <text x="200" y="725" fill="#ff6b6b">Email notifications</text>
    <text x="200" y="740" fill="#ff6b6b">Threshold alerts</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" fill="#343a40" font-size="24" font-weight="bold">Wishlist View Wireframe</text>
</svg>