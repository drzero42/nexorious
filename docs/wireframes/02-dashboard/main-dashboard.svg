<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <!-- Grid lines for reference -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#grid)"/>
  
  <!-- Sidebar Navigation -->
  <rect x="0" y="0" width="240" height="900" fill="#343a40"/>
  
  <!-- Logo/Brand -->
  <text x="120" y="40" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Nexorious</text>
  <text x="120" y="60" text-anchor="middle" fill="#adb5bd" font-size="12">Game Collection</text>
  
  <!-- Navigation Menu -->
  <g fill="#adb5bd" font-size="14">
    <!-- Dashboard - Active -->
    <rect x="20" y="100" width="200" height="40" rx="4" fill="#007bff"/>
    <text x="40" y="125" fill="white" font-weight="500">📊 Dashboard</text>
    
    <!-- Library -->
    <rect x="20" y="150" width="200" height="40" rx="4" fill="transparent"/>
    <text x="40" y="175">🎮 Library</text>
    
    <!-- Add Game -->
    <rect x="20" y="200" width="200" height="40" rx="4" fill="transparent"/>
    <text x="40" y="225">➕ Add Game</text>
    
    <!-- Wishlist -->
    <rect x="20" y="250" width="200" height="40" rx="4" fill="transparent"/>
    <text x="40" y="275">❤️ Wishlist</text>
    
    <!-- Statistics -->
    <rect x="20" y="300" width="200" height="40" rx="4" fill="transparent"/>
    <text x="40" y="325">📈 Statistics</text>
    
    <!-- Settings -->
    <rect x="20" y="750" width="200" height="40" rx="4" fill="transparent"/>
    <text x="40" y="775">⚙️ Settings</text>
    
    <!-- User Profile -->
    <rect x="20" y="800" width="200" height="40" rx="4" fill="transparent"/>
    <text x="40" y="825">👤 Profile</text>
  </g>
  
  <!-- Main Content Area -->
  <rect x="240" y="0" width="960" height="900" fill="white"/>
  
  <!-- Top Bar -->
  <rect x="240" y="0" width="960" height="70" fill="white" stroke="#dee2e6" stroke-width="0 0 1 0"/>
  
  <!-- Page Title -->
  <text x="280" y="30" fill="#343a40" font-size="24" font-weight="bold">Dashboard</text>
  <text x="280" y="50" fill="#6c757d" font-size="14">Welcome back! Here's what's happening with your collection</text>
  
  <!-- Search Bar -->
  <rect x="700" y="20" width="300" height="36" rx="18" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
  <text x="720" y="40" fill="#6c757d" font-size="14">🔍 Search your library...</text>
  
  <!-- Profile/Settings -->
  <circle cx="1050" cy="38" r="16" fill="#007bff"/>
  <text x="1045" y="43" fill="white" font-size="14" font-weight="bold">JD</text>
  
  <!-- Theme Toggle -->
  <rect x="1100" y="25" width="50" height="26" rx="13" fill="#ced4da"/>
  <circle cx="1125" cy="38" r="10" fill="white"/>
  <text x="1080" y="43" fill="#6c757d" font-size="12">🌙</text>
  
  <!-- Statistics Cards Row -->
  <g transform="translate(280, 100)">
    <!-- Total Games Card -->
    <rect x="0" y="0" width="200" height="120" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="20" y="25" fill="#6c757d" font-size="12" font-weight="500">TOTAL GAMES</text>
    <text x="20" y="55" fill="#343a40" font-size="32" font-weight="bold">1,247</text>
    <text x="20" y="80" fill="#28a745" font-size="12">+12 this month</text>
    <text x="160" y="60" fill="#007bff" font-size="32">🎮</text>
    
    <!-- Completed Games Card -->
    <rect x="220" y="0" width="200" height="120" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="240" y="25" fill="#6c757d" font-size="12" font-weight="500">COMPLETED</text>
    <text x="240" y="55" fill="#343a40" font-size="32" font-weight="bold">342</text>
    <text x="240" y="80" fill="#28a745" font-size="12">+5 this month</text>
    <text x="380" y="60" fill="#28a745" font-size="32">✅</text>
    
    <!-- Pile of Shame Card -->
    <rect x="440" y="0" width="200" height="120" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="460" y="25" fill="#6c757d" font-size="12" font-weight="500">PILE OF SHAME</text>
    <text x="460" y="55" fill="#343a40" font-size="32" font-weight="bold">623</text>
    <text x="460" y="80" fill="#dc3545" font-size="12">50% of collection</text>
    <text x="600" y="60" fill="#ffc107" font-size="32">📚</text>
    
    <!-- Hours Played Card -->
    <rect x="660" y="0" width="200" height="120" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="680" y="25" fill="#6c757d" font-size="12" font-weight="500">HOURS PLAYED</text>
    <text x="680" y="55" fill="#343a40" font-size="32" font-weight="bold">2,847</text>
    <text x="680" y="80" fill="#17a2b8" font-size="12">+45 this week</text>
    <text x="820" y="60" fill="#17a2b8" font-size="32">⏰</text>
  </g>
  
  <!-- Recent Activity Section -->
  <g transform="translate(280, 260)">
    <text x="0" y="0" fill="#343a40" font-size="18" font-weight="bold">Recent Activity</text>
    
    <!-- Activity Card -->
    <rect x="0" y="20" width="580" height="300" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Activity Items -->
    <g transform="translate(20, 40)">
      <!-- Activity Item 1 -->
      <rect x="0" y="0" width="48" height="48" rx="24" fill="#007bff"/>
      <text x="24" y="30" text-anchor="middle" fill="white" font-size="20">🎮</text>
      <text x="60" y="20" fill="#343a40" font-size="14" font-weight="500">Completed Baldur's Gate 3</text>
      <text x="60" y="35" fill="#6c757d" font-size="12">2 hours ago • 87 hours played</text>
      
      <!-- Activity Item 2 -->
      <rect x="0" y="60" width="48" height="48" rx="24" fill="#28a745"/>
      <text x="24" y="90" text-anchor="middle" fill="white" font-size="20">⭐</text>
      <text x="60" y="80" fill="#343a40" font-size="14" font-weight="500">Rated Cyberpunk 2077</text>
      <text x="60" y="95" fill="#6c757d" font-size="12">1 day ago • 4 stars</text>
      
      <!-- Activity Item 3 -->
      <rect x="0" y="120" width="48" height="48" rx="24" fill="#ffc107"/>
      <text x="24" y="150" text-anchor="middle" fill="white" font-size="20">➕</text>
      <text x="60" y="140" fill="#343a40" font-size="14" font-weight="500">Added Hollow Knight to library</text>
      <text x="60" y="155" fill="#6c757d" font-size="12">3 days ago • Steam</text>
      
      <!-- Activity Item 4 -->
      <rect x="0" y="180" width="48" height="48" rx="24" fill="#dc3545"/>
      <text x="24" y="210" text-anchor="middle" fill="white" font-size="20">❤️</text>
      <text x="60" y="200" fill="#343a40" font-size="14" font-weight="500">Added Elden Ring to wishlist</text>
      <text x="60" y="215" fill="#6c757d" font-size="12">1 week ago • PlayStation 5</text>
    </g>
  </g>
  
  <!-- Quick Actions Section -->
  <g transform="translate(900, 260)">
    <text x="0" y="0" fill="#343a40" font-size="18" font-weight="bold">Quick Actions</text>
    
    <!-- Quick Actions Card -->
    <rect x="0" y="20" width="280" height="300" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Action Buttons -->
    <g transform="translate(20, 40)">
      <!-- Add Game Button -->
      <rect x="0" y="0" width="240" height="48" rx="4" fill="#007bff"/>
      <text x="120" y="30" text-anchor="middle" fill="white" font-size="14" font-weight="500">➕ Add New Game</text>
      
      <!-- Import Library Button -->
      <rect x="0" y="60" width="240" height="48" rx="4" fill="#17a2b8"/>
      <text x="120" y="90" text-anchor="middle" fill="white" font-size="14" font-weight="500">📁 Import Library</text>
      
      <!-- Random Game Button -->
      <rect x="0" y="120" width="240" height="48" rx="4" fill="#ffc107"/>
      <text x="120" y="150" text-anchor="middle" fill="white" font-size="14" font-weight="500">🎲 Random Game</text>
      
      <!-- Backup Data Button -->
      <rect x="0" y="180" width="240" height="48" rx="4" fill="#6c757d"/>
      <text x="120" y="210" text-anchor="middle" fill="white" font-size="14" font-weight="500">💾 Backup Data</text>
    </g>
  </g>
  
  <!-- Recently Added Games Section -->
  <g transform="translate(280, 600)">
    <text x="0" y="0" fill="#343a40" font-size="18" font-weight="bold">Recently Added</text>
    <text x="700" y="0" fill="#007bff" font-size="14" text-decoration="underline">View all →</text>
    
    <!-- Games Grid -->
    <g transform="translate(0, 20)">
      <!-- Game 1 -->
      <rect x="0" y="0" width="160" height="220" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      <rect x="10" y="10" width="140" height="180" rx="4" fill="#e9ecef"/>
      <text x="80" y="105" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
      <text x="80" y="205" text-anchor="middle" fill="#343a40" font-size="12" font-weight="500">Baldur's Gate 3</text>
      
      <!-- Game 2 -->
      <rect x="180" y="0" width="160" height="220" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      <rect x="190" y="10" width="140" height="180" rx="4" fill="#e9ecef"/>
      <text x="260" y="105" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
      <text x="260" y="205" text-anchor="middle" fill="#343a40" font-size="12" font-weight="500">Cyberpunk 2077</text>
      
      <!-- Game 3 -->
      <rect x="360" y="0" width="160" height="220" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      <rect x="370" y="10" width="140" height="180" rx="4" fill="#e9ecef"/>
      <text x="440" y="105" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
      <text x="440" y="205" text-anchor="middle" fill="#343a40" font-size="12" font-weight="500">Hollow Knight</text>
      
      <!-- Game 4 -->
      <rect x="540" y="0" width="160" height="220" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      <rect x="550" y="10" width="140" height="180" rx="4" fill="#e9ecef"/>
      <text x="620" y="105" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
      <text x="620" y="205" text-anchor="middle" fill="#343a40" font-size="12" font-weight="500">Elden Ring</text>
      
      <!-- Game 5 -->
      <rect x="720" y="0" width="160" height="220" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
      <rect x="730" y="10" width="140" height="180" rx="4" fill="#e9ecef"/>
      <text x="800" y="105" text-anchor="middle" fill="#6c757d" font-size="12">Cover Art</text>
      <text x="800" y="205" text-anchor="middle" fill="#343a40" font-size="12" font-weight="500">Spider-Man 2</text>
    </g>
  </g>
  
  <!-- Annotations -->
  <g fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" font-size="12">
    <!-- Statistics annotation -->
    <line x1="280" y1="160" x2="200" y2="160" stroke-dasharray="2,2"/>
    <text x="50" y="160" fill="#ff6b6b">Real-time stats</text>
    <text x="50" y="175" fill="#ff6b6b">Auto-calculated</text>
    
    <!-- Quick actions annotation -->
    <line x1="900" y1="300" x2="850" y2="300" stroke-dasharray="2,2"/>
    <text x="750" y="300" fill="#ff6b6b">Context actions</text>
    <text x="750" y="315" fill="#ff6b6b">Keyboard shortcuts</text>
    
    <!-- Recent activity annotation -->
    <line x1="280" y1="400" x2="200" y2="400" stroke-dasharray="2,2"/>
    <text x="50" y="400" fill="#ff6b6b">Live activity feed</text>
    <text x="50" y="415" fill="#ff6b6b">User actions</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" fill="#343a40" font-size="24" font-weight="bold">Main Dashboard Wireframe</text>
</svg>