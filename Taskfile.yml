# Taskfile.yml
# Task runner for local Helm chart testing with minikube (KVM2 driver).
# Usage:
#   task dev:up            # Start cluster and deploy chart (TAG=dev)
#   task dev:up TAG=1.2.3  # Same with a specific image tag
#   task dev:deploy        # Deploy/upgrade chart only (cluster must be running)
#   task dev:down          # Uninstall release and stop minikube
#
# Prerequisites:
#   - minikube installed with kvm2 driver
#   - helm installed
#   - .env file at repo root with IGDB_CLIENT_ID and IGDB_CLIENT_SECRET

version: '3'

vars:
  TAG: '{{.TAG | default "dev"}}'
  RELEASE: nexorious
  CHART: deploy/helm

tasks:

  # ---------------------------------------------------------------------------
  # Public tasks
  # ---------------------------------------------------------------------------

  dev:up:
    desc: "Start minikube cluster, enable addons, and deploy the Helm chart (TAG={{.TAG}})"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: minikube:start
      - task: minikube:addons
      - task: ingress:wait
      - task: helm:deploy
      - |
        echo ""
        echo "Deploy complete. To access nexorious.local:"
        echo "  1. Add to /etc/hosts:  $(minikube ip) nexorious.local"
        echo "  2. In another terminal: minikube tunnel"
        echo ""

  dev:deploy:
    desc: "Deploy/upgrade the Helm chart only — cluster must already be running (TAG={{.TAG}})"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: helm:deploy

  dev:down:
    desc: "Uninstall the Helm release and stop minikube"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - helm uninstall {{.RELEASE}} --ignore-not-found
      - minikube stop

  minikube:start:
    desc: "Start minikube with the KVM2 driver (idempotent)"
    cmds:
      - minikube start --driver=kvm2 --cpus=4 --memory=8192 --disk-size=20g

  minikube:addons:
    desc: "Enable storage-provisioner and ingress addons (idempotent)"
    cmds:
      - minikube addons enable storage-provisioner
      - minikube addons enable ingress

  # ---------------------------------------------------------------------------
  # Internal tasks (not shown in task --list)
  # ---------------------------------------------------------------------------

  ingress:wait:
    internal: true
    desc: "Wait for ingress-nginx controller pod and admission webhook endpoint to be ready"
    cmds:
      - |
        echo "Waiting for ingress-nginx controller pod..."
        kubectl wait --namespace ingress-nginx \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=120s
      - |
        echo "Probing ingress-nginx admission webhook TCP port 443..."
        SVC_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller-admission \
          -o jsonpath='{.spec.clusterIP}')
        deadline=$(($(date +%s) + 90))
        until minikube ssh "bash -c 'echo >/dev/tcp/${SVC_IP}/443'" 2>/dev/null; do
          if [ "$(date +%s)" -ge "$deadline" ]; then
            echo "ERROR: timed out waiting for ingress-nginx admission webhook on ${SVC_IP}:443"
            exit 1
          fi
          echo "  port not open yet, retrying in 3s..."
          sleep 3
        done
        echo "Ingress admission webhook is accepting connections."


  check-env:
    internal: true
    desc: "Verify .env exists and contains IGDB credentials"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - |
        if [ ! -f .env ]; then
          echo "ERROR: .env file not found."
          echo "Copy .env.example and fill in your IGDB credentials:"
          echo "  cp .env.example .env"
          exit 1
        fi
        IGDB_ID=$(grep '^IGDB_CLIENT_ID=' .env | cut -d= -f2-)
        if [ -z "$IGDB_ID" ]; then
          echo "ERROR: IGDB_CLIENT_ID is not set in .env"
          echo "Edit .env and set a real IGDB_CLIENT_ID."
          exit 1
        fi
        case "$IGDB_ID" in
          your-*)
            echo "ERROR: IGDB_CLIENT_ID still contains the placeholder value."
            echo "Edit .env and set a real IGDB_CLIENT_ID."
            exit 1
            ;;
        esac
        IGDB_SECRET=$(grep '^IGDB_CLIENT_SECRET=' .env | cut -d= -f2-)
        if [ -z "$IGDB_SECRET" ]; then
          echo "ERROR: IGDB_CLIENT_SECRET is not set in .env"
          echo "Edit .env and set a real IGDB_CLIENT_SECRET."
          exit 1
        fi
        case "$IGDB_SECRET" in
          your-*)
            echo "ERROR: IGDB_CLIENT_SECRET still contains the placeholder value."
            echo "Edit .env and set a real IGDB_CLIENT_SECRET."
            exit 1
            ;;
        esac

  helm:deploy:
    internal: true
    desc: "Run helm upgrade --install with dev values and env-sourced IGDB creds"
    dir: "{{.ROOT_DIR}}"
    deps: [check-env]
    vars:
      IGDB_CLIENT_ID:
        sh: grep '^IGDB_CLIENT_ID=' .env | cut -d= -f2-
      IGDB_CLIENT_SECRET:
        sh: grep '^IGDB_CLIENT_SECRET=' .env | cut -d= -f2-
    cmds:
      - |
        helm upgrade --install {{.RELEASE}} {{.CHART}} \
          -f {{.CHART}}/values-dev.yaml \
          --set nexorious.igdbClientId={{.IGDB_CLIENT_ID}} \
          --set nexorious.igdbClientSecret={{.IGDB_CLIENT_SECRET}} \
          --set controllers.api.containers.main.image.tag={{.TAG}} \
          --set controllers.worker.containers.main.image.tag={{.TAG}} \
          --set controllers.scheduler.containers.main.image.tag={{.TAG}} \
          --wait --timeout=5m
